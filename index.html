<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Compact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fafafa;
      --fg: #0a0a0a;
      --muted: #8a8a8a;
      --line: #e5e5e5;
      --panel: #fcfcfc;
      --space-1: 6px;
      --space-2: 10px;
      --space-3: 14px;
      --space-4: 18px;
      --radius: 16px;
      --radius-sm: 10px;
      --label-size: 10px;
      --small: 9px;
      --timer-size: 30px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    .widget {
      width: 100%;
      max-width: 380px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2);
      align-items: start;
      margin-bottom: 14px;
    }

    .clock-label,
    .section-title,
    .mini-label {
      font-size: var(--label-size);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--fg);
    }

    .clock-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      background: var(--panel);
    }

    .clock-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 300;
      line-height: 1;
      margin-top: 8px;
    }

    .clock-date {
      margin-top: 6px;
      color: var(--muted);
      font-size: var(--small);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--bg);
    }

    .timer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .mode-row {
      display: flex;
      gap: 6px;
    }

    .mode {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .mode.active {
      background: var(--fg);
      border-color: var(--fg);
      color: #fff;
    }

    .timer-display {
      display: grid;
      justify-items: center;
      gap: 8px;
      padding: 10px 0 8px;
    }

    .timer-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--timer-size);
      font-weight: 300;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      outline: none;
    }

    .timer-time:hover,
    .timer-time:focus { background: #f5f5f5; }

    .status {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--fg);
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #f0f0f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      width: 100%;
      height: 100%;
      background: var(--fg);
      border-radius: inherit;
      transform-origin: left center;
      transition: transform 0.9s linear;
    }

    .controls {
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      gap: 8px;
      margin-top: 14px;
    }

    .btn,
    .icon-btn,
    .mini-btn,
    .music-btn,
    .notes-add,
    .notes-clear {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn {
      padding: 10px 14px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .btn.primary {
      background: var(--fg);
      color: #fff;
      border-color: var(--fg);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
    }

    .icon-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .settings {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 4px;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stepper {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .stepper button {
      width: 26px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
    }

    .stepper input {
      flex: 1;
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      -moz-appearance: textfield;
    }

    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    details.section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px 14px;
      background: var(--bg);
    }

    details.section summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    details.section summary::-webkit-details-marker { display: none; }

    .chev {
      width: 10px;
      height: 10px;
      border-right: 1.5px solid var(--muted);
      border-bottom: 1.5px solid var(--muted);
      transform: rotate(45deg);
      transition: transform 0.2s ease;
      margin-right: 4px;
    }

    details[open] .chev { transform: rotate(225deg); margin-top: 4px; }

    .section-body { margin-top: 12px; }

    .perplexity-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .perplexity-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 11px;
      outline: none;
    }

    .perplexity-input:focus {
      border-color: #4a72ff;
      box-shadow: 0 0 0 1px #4a72ff33;
    }

    .mini-btn {
      padding: 9px 12px;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .notes-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 10px;
    }

    .notes-add {
      width: 22px;
      height: 22px;
      font-size: 14px;
    }

    .notes-clear {
      padding: 0 8px;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      height: 22px;
    }

    .notes-clear:disabled { opacity: 0.35; cursor: not-allowed; }
    .notes-clear.armed { background: #b00020; color: #fff; border-color: #b00020; }

    .notes-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sticky {
      position: relative;
      min-height: 92px;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 6px 14px rgba(0,0,0,0.06);
    }

    .sticky:nth-child(4n+1) { background: #fff9c4; }
    .sticky:nth-child(4n+2) { background: #ffe0b2; }
    .sticky:nth-child(4n+3) { background: #ffccbc; }
    .sticky:nth-child(4n)   { background: #dcedc8; }

    .sticky-text {
      width: 100%;
      min-height: 72px;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      font-size: 11px;
      line-height: 1.35;
      padding-right: 18px;
      font-family: inherit;
    }

    .sticky-del {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
    }

    .notes-empty {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.08em;
      font-style: italic;
      padding-top: 4px;
    }

    .music-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .music-btn {
      padding: 6px 12px;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .music-btn.active {
      background: var(--fg);
      color: #fff;
      border-color: var(--fg);
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #000;
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-hint {
      margin-top: 8px;
      text-align: center;
      color: var(--muted);
      font-size: 8px;
      letter-spacing: 0.08em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="topbar">
      <div class="clock-box">
        <div class="clock-label">Current Time</div>
        <div class="clock-time" id="wallclockTime">--:--</div>
        <div class="clock-date" id="wallclockDate">Eastern Time</div>
      </div>
    </div>

    <div class="stack">
      <section class="panel">
        <div class="timer-head">
          <div class="section-title">Pomodoro</div>
          <div class="mode-row" role="tablist" aria-label="Timer modes">
            <button class="mode active" data-mode="focus" type="button">Focus</button>
            <button class="mode" data-mode="break" type="button">Break</button>
          </div>
        </div>

        <div class="timer-display">
          <div class="timer-time" id="timeDisplay" contenteditable="true" spellcheck="false">25:00</div>
          <div class="status" id="statusText">Ready</div>
        </div>

        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="controls">
          <button class="icon-btn" id="resetBtn" type="button" aria-label="Reset timer">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 3v6h6"></path></svg>
          </button>
          <button class="btn primary" id="startPauseBtn" type="button">Start</button>
          <button class="icon-btn" id="settingsToggle" type="button" aria-label="Toggle settings">
            <svg viewBox="0 0 24 24"><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
          </button>
        </div>

        <div class="settings" id="settingsPanel" hidden>
          <div class="field-grid">
            <div class="field">
              <label for="focusMinutes">Focus</label>
              <div class="stepper">
                <button type="button" data-step="-1" data-target="focusMinutes">−</button>
                <input id="focusMinutes" type="number" min="1" max="180" value="25">
                <button type="button" data-step="1" data-target="focusMinutes">+</button>
              </div>
            </div>
            <div class="field">
              <label for="breakMinutes">Break</label>
              <div class="stepper">
                <button type="button" data-step="-1" data-target="breakMinutes">−</button>
                <input id="breakMinutes" type="number" min="1" max="60" value="5">
                <button type="button" data-step="1" data-target="breakMinutes">+</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <details class="section" open>
        <summary>
          <span class="section-title">Perplexity Search</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>
        <div class="section-body">
          <form class="perplexity-form" id="perplexityForm">
            <label class="sr-only" for="perplexityInput">Ask Perplexity</label>
            <input id="perplexityInput" class="perplexity-input" type="text" placeholder="Ask Perplexity anything..." autocomplete="off" required>
            <button class="mini-btn" type="submit">Search</button>
          </form>
        </div>
      </details>

      <details class="section" open>
        <summary>
          <span class="section-title">Sticky Notes</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>
        <div class="section-body">
          <div class="notes-actions">
            <button class="notes-add" id="addNoteBtn" type="button" aria-label="Add note">+</button>
            <button class="notes-clear" id="clearNotesBtn" type="button" disabled>Clear</button>
          </div>
          <div class="notes-list" id="notesList"></div>
          <div class="notes-empty" id="notesEmpty">No notes yet.</div>
        </div>
      </details>

      <details class="section">
        <summary>
          <span class="section-title">Music</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>
        <div class="section-body">
          <div class="music-row" id="videoPlaylists"></div>
          <div class="video-frame">
            <iframe
              id="videoFrame"
              src="https://www.youtube-nocookie.com/embed/oPVte6aMprI?autoplay=0&rel=0&list=RDoPVte6aMprI"
              title="Music player"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen></iframe>
          </div>
          <div class="video-hint">Choose a playlist for background focus.</div>
        </div>
      </details>
    </div>
  </div>

  <script>
    const state = {
      durations: { focus: 25, break: 5 },
      mode: 'focus',
      totalSeconds: 25 * 60,
      remainingSeconds: 25 * 60,
      running: false,
      intervalId: null,
      clearArmed: false,
      notes: []
    };

    const modes = document.querySelectorAll('.mode');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const wallclockTime = document.getElementById('wallclockTime');
    const wallclockDate = document.getElementById('wallclockDate');
    const focusMinutes = document.getElementById('focusMinutes');
    const breakMinutes = document.getElementById('breakMinutes');
    const notesList = document.getElementById('notesList');
    const notesEmpty = document.getElementById('notesEmpty');
    const addNoteBtn = document.getElementById('addNoteBtn');
    const clearNotesBtn = document.getElementById('clearNotesBtn');
    const perplexityForm = document.getElementById('perplexityForm');
    const perplexityInput = document.getElementById('perplexityInput');
    const videoFrame = document.getElementById('videoFrame');
    const videoPlaylists = document.getElementById('videoPlaylists');

    const playlists = [
      { label: 'Relax', url: 'https://www.youtube-nocookie.com/embed/oPVte6aMprI?autoplay=0&rel=0&list=RDoPVte6aMprI' },
      { label: 'Country', url: 'https://www.youtube-nocookie.com/embed/TsfDpW7PYN8?autoplay=0&rel=0&list=RDTsfDpW7PYN8' }
    ];

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function parseTime(text) {
      const match = text.trim().match(/^(\d{1,3}):(\d{2})$/);
      if (!match) return null;
      const minutes = Number(match[1]);
      const seconds = Number(match[2]);
      if (seconds > 59) return null;
      return minutes * 60 + seconds;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(state.remainingSeconds);
      const ratio = state.totalSeconds > 0 ? state.remainingSeconds / state.totalSeconds : 0;
      progressFill.style.transform = `scaleX(${ratio})`;
      statusText.textContent = state.running ? 'Running' : (state.remainingSeconds === 0 ? 'Complete' : 'Ready');
      startPauseBtn.textContent = state.running ? 'Pause' : 'Start';
    }

    function setMode(mode) {
      state.mode = mode;
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = state.durations[mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      modes.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      updateDisplay();
    }

    function tick() {
      if (state.remainingSeconds > 0) {
        state.remainingSeconds -= 1;
        updateDisplay();
      } else {
        state.running = false;
        clearInterval(state.intervalId);
        state.intervalId = null;
        updateDisplay();
      }
    }

    function toggleTimer() {
      if (state.running) {
        state.running = false;
        clearInterval(state.intervalId);
        state.intervalId = null;
      } else {
        state.running = true;
        state.intervalId = setInterval(tick, 1000);
      }
      updateDisplay();
    }

    function resetTimer() {
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = state.durations[state.mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      updateDisplay();
    }

    function toggleSettings() {
      const isHidden = settingsPanel.hasAttribute('hidden');
      if (isHidden) settingsPanel.removeAttribute('hidden');
      else settingsPanel.setAttribute('hidden', '');
    }

    function clampInputValue(input) {
      const min = Number(input.min || 1);
      const max = Number(input.max || 999);
      let value = Number(input.value || min);
      if (!Number.isFinite(value)) value = min;
      value = Math.min(max, Math.max(min, value));
      input.value = value;
      return value;
    }

    function applyDurations() {
      state.durations.focus = clampInputValue(focusMinutes);
      state.durations.break = clampInputValue(breakMinutes);
      state.totalSeconds = state.durations[state.mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      updateDisplay();
    }

    function updateWallclock() {
      const now = new Date();
      const time = new Intl.DateTimeFormat('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: 'America/New_York'
      }).format(now);
      const date = new Intl.DateTimeFormat('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        timeZone: 'America/New_York'
      }).format(now);
      wallclockTime.textContent = time;
      wallclockDate.textContent = `${date} · Eastern Time`;
    }

    function renderNotes() {
      notesList.innerHTML = '';
      notesEmpty.style.display = state.notes.length ? 'none' : 'block';
      clearNotesBtn.disabled = state.notes.length === 0;
      if (state.notes.length === 0) return;

      state.notes.forEach((note, index) => {
        const card = document.createElement('div');
        card.className = 'sticky';

        const del = document.createElement('button');
        del.className = 'sticky-del';
        del.type = 'button';
        del.setAttribute('aria-label', 'Delete note');
        del.textContent = '×';
        del.addEventListener('click', () => {
          state.notes.splice(index, 1);
          state.clearArmed = false;
          clearNotesBtn.classList.remove('armed');
          clearNotesBtn.textContent = 'Clear';
          renderNotes();
        });

        const text = document.createElement('textarea');
        text.className = 'sticky-text';
        text.value = note;
        text.placeholder = 'Write here...';
        text.addEventListener('input', () => {
          state.notes[index] = text.value;
        });

        card.appendChild(del);
        card.appendChild(text);
        notesList.appendChild(card);
      });
    }

    function addNote() {
      state.notes.unshift('');
      state.clearArmed = false;
      clearNotesBtn.classList.remove('armed');
      clearNotesBtn.textContent = 'Clear';
      renderNotes();
      const first = notesList.querySelector('.sticky-text');
      if (first) first.focus();
    }

    function clearNotes() {
      if (!state.clearArmed) {
        state.clearArmed = true;
        clearNotesBtn.classList.add('armed');
        clearNotesBtn.textContent = 'Sure?';
        setTimeout(() => {
          state.clearArmed = false;
          clearNotesBtn.classList.remove('armed');
          clearNotesBtn.textContent = 'Clear';
        }, 2500);
        return;
      }
      state.notes = [];
      state.clearArmed = false;
      clearNotesBtn.classList.remove('armed');
      clearNotesBtn.textContent = 'Clear';
      renderNotes();
    }

    function setupVideoPlaylists() {
      playlists.forEach((playlist, index) => {
        const btn = document.createElement('button');
        btn.className = 'music-btn' + (index === 0 ? ' active' : '');
        btn.type = 'button';
        btn.textContent = playlist.label;
        btn.addEventListener('click', () => {
          videoFrame.src = playlist.url;
          document.querySelectorAll('.music-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
        videoPlaylists.appendChild(btn);
      });
    }

    function handlePerplexitySearch(e) {
      e.preventDefault();
      const query = perplexityInput.value.trim();
      if (!query) return;
      const url = 'https://www.perplexity.ai/search?q=' + encodeURIComponent(query);
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    modes.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
    startPauseBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    settingsToggle.addEventListener('click', toggleSettings);

    [focusMinutes, breakMinutes].forEach(input => {
      input.addEventListener('change', applyDurations);
      input.addEventListener('blur', applyDurations);
    });

    document.querySelectorAll('.stepper button').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const step = Number(btn.dataset.step || 0);
        target.value = Number(target.value || 0) + step;
        applyDurations();
      });
    });

    timeDisplay.addEventListener('blur', () => {
      const parsed = parseTime(timeDisplay.textContent);
      if (parsed === null || parsed <= 0) {
        updateDisplay();
        return;
      }
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = parsed;
      state.remainingSeconds = parsed;
      updateDisplay();
    });

    timeDisplay.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        timeDisplay.blur();
      }
    });

    addNoteBtn.addEventListener('click', addNote);
    clearNotesBtn.addEventListener('click', clearNotes);
    perplexityForm.addEventListener('submit', handlePerplexitySearch);

    updateDisplay();
    updateWallclock();
    setInterval(updateWallclock, 1000);
    renderNotes();
    setupVideoPlaylists();
  </script>
</body>
</html>
