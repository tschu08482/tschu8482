<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fafafa;
      --fg: #0a0a0a;
      --muted: #8a8a8a;
      --line: #e5e5e5;
      --embed-w: 760px;
      --space-1: clamp(4px, calc(var(--embed-w) * 0.006), 6px);
      --space-2: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
      --space-3: clamp(10px, calc(var(--embed-w) * 0.016), 14px);
      --space-4: clamp(12px, calc(var(--embed-w) * 0.022), 18px);
      --space-5: clamp(16px, calc(var(--embed-w) * 0.03), 24px);
      --dial-size: clamp(118px, calc(var(--embed-w) * 0.22), 168px);
      --wallclock-size: clamp(30px, calc(var(--embed-w) * 0.06), 44px);
      --timer-size: clamp(26px, calc(var(--embed-w) * 0.05), 34px);
      --label-size: clamp(9px, calc(var(--embed-w) * 0.015), 11px);
      --button-size: clamp(9px, calc(var(--embed-w) * 0.012), 10px);
      --tick-origin: calc(var(--dial-size) * 0.475);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-2);
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      width: 100%;
      max-width: 100%;
      container-type: inline-size;
      border-radius: 18px;
      padding: 36px 0 32px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-5);
      padding: clamp(14px, calc(var(--embed-w) * 0.022), 20px);
      width: 100%;
      max-width: 420px;
    }

    .wallclock,
    .dial-col {
      width: 100%;
      min-width: 0;
    }

    .wallclock {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      padding-inline: 24px;
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--line);
    }

    .wallclock-label,
    .dial-label,
    .toggle-label {
      font-size: var(--label-size);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg);
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .dial-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding-inline: 24px;
    }

    .dial-label {
      margin-top: var(--space-1);
    }

    .dial-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      width: 100%;
    }

    .dial-wrap {
      position: relative;
      width: var(--dial-size);
      height: var(--dial-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg.dial {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .track {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .progress {
      fill: none;
      stroke: var(--fg);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear;
    }

    .ticks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 4px;
      width: 1px;
      height: 5px;
      background: #d5d5d5;
      transform-origin: 50% var(--tick-origin);
    }

    .tick.major { background: #a5a5a5; height: 7px; }

    .readout {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 200;
      font-size: var(--timer-size);
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      cursor: text;
      padding: 2px 4px;
      border-radius: 4px;
      outline: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      caret-color: var(--fg);
      white-space: nowrap;
    }

    .time:hover { background: #f4f4f4; }
    .time:focus { background: #f0f0f0; box-shadow: 0 0 0 1px var(--line); }

    .status {
      font-size: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--fg);
      font-weight: 700;
    }

    .wallclock-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .wallclock-time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: var(--wallclock-size);
      line-height: 1;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .wallclock-date {
      font-size: clamp(9px, calc(var(--embed-w) * 0.015), 11px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--fg);
      margin-top: 4px;
      white-space: nowrap;
    }

    .panel-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      width: 100%;
    }

    .modes {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 2px;
      border-radius: 999px;
      width: 100%;
      max-width: 320px;
      overflow: hidden;
    }

    .mode {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: clamp(5px, calc(var(--embed-w) * 0.008), 6px) clamp(8px, calc(var(--embed-w) * 0.015), 12px);
      font-size: clamp(7px, calc(var(--embed-w) * 0.0105), 8px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s ease, background 0.2s ease;
      flex: 1 1 0;
      min-width: 0;
      white-space: nowrap;
    }

    .mode:hover { color: var(--fg); }
    .mode.active { background: var(--fg); color: #fff; }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      font-family: inherit;
      font-size: var(--button-size);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: clamp(8px, calc(var(--embed-w) * 0.012), 10px) clamp(14px, calc(var(--embed-w) * 0.022), 18px);
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--fg);
      white-space: nowrap;
    }

    .btn:hover { border-color: #b5b5b5; }
    .btn:active { transform: scale(0.97); }
    .btn.primary {
      background: var(--fg);
      color: #fff;
      border-color: var(--fg);
      width: 100%;
    }

    .btn.icon {
      width: 34px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn.icon svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .settings-toggle {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: clamp(7px, calc(var(--embed-w) * 0.0105), 8px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .settings-toggle svg {
      width: 8px;
      height: 8px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      transition: transform 0.3s ease;
    }

    .settings-toggle.open svg { transform: rotate(180deg); }

    .settings {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-2);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
      padding: 0;
    }

    .settings.open {
      max-height: 260px;
      opacity: 1;
      padding: 12px 0 4px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      font-size: 7px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stepper {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      overflow: hidden;
    }

    .stepper button {
      width: 20px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--fg);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .stepper button:hover { background: #f0f0f0; }

    .stepper input {
      flex: 1;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--fg);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--button-size);
      padding: 0;
      -moz-appearance: textfield;
    }

    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .notes-section,
    .video-section,
    .perplexity-section {
      width: 100%;
      max-width: 420px;
      margin-top: var(--space-4);
      padding: var(--space-4) 24px 0;
      border-top: 1px solid var(--line);
    }

    .notes-shell,
    .video-shell {
      width: 100%;
      padding: 8px 0 0;
    }

    .video-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .notes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .section-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }

    .section-toggle svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      color: var(--muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .section-content {
      overflow: hidden;
      max-height: 1400px;
      opacity: 1;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin-top 0.2s ease;
      margin-top: var(--space-2);
    }

    .section-block.collapsed .section-toggle svg { transform: rotate(-90deg); }
    .section-block.collapsed .section-content {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    /* Perplexity search bar */

    .perplexity-form {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .perplexity-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }

    .perplexity-input:focus {
      border-color: #4a72ff;
      box-shadow: 0 0 0 1px #4a72ff33;
    }

    .perplexity-btn {
      font-size: 9px;
      padding-inline: 14px;
      white-space: nowrap;
    }

    .notes-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .notes-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notes-add,
    .notes-clear {
      height: 20px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--fg);
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .notes-add { width: 20px; font-size: 13px; }
    .notes-clear {
      padding: 0 8px;
      font-size: 7px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .notes-add:hover { background: var(--fg); color: #fff; border-color: var(--fg); }
    .notes-clear:hover { color: #b00020; border-color: #b00020; }
    .notes-clear:disabled { opacity: 0.35; cursor: not-allowed; }
    .notes-clear.armed { background: #b00020; color: #fff; border-color: #b00020; }

    /* Bigger scrollable notes section */

    .notes-shell {
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .notes-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      padding: 8px 2px 6px;
      min-height: 60px;
    }

    .sticky {
      position: relative;
      width: 100%;
      height: 130px;
      background: #fff9c4;
      border-radius: 4px;
      padding: 10px 12px 8px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.04),
                  0 2px 6px rgba(0,0,0,0.06),
                  0 8px 14px -6px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      cursor: grab;
    }

    .sticky:nth-child(4n+1) { background: #fff9c4; transform: rotate(-1.4deg); }
    .sticky:nth-child(4n+2) { background: #ffe0b2; transform: rotate(1.2deg); }
    .sticky:nth-child(4n+3) { background: #ffccbc; transform: rotate(-0.6deg); }
    .sticky:nth-child(4n)   { background: #dcedc8; transform: rotate(1.6deg); }

    .sticky:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow: 0 2px 2px rgba(0,0,0,0.05),
                  0 6px 12px rgba(0,0,0,0.08),
                  0 14px 20px -8px rgba(0,0,0,0.12);
      z-index: 2;
    }

    .sticky.dragging {
      opacity: 0.4;
      transform: rotate(0deg) scale(0.98);
    }

    .sticky.drop-target {
      box-shadow: 0 0 0 2px var(--fg),
                  0 2px 6px rgba(0,0,0,0.06),
                  0 8px 14px -6px rgba(0,0,0,0.08);
    }

    .sticky-text {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 11px;
      line-height: 1.4;
      color: #1a1a1a;
      padding: 0 20px 0 0;
      width: 100%;
      min-height: 26px;
    }

    .sticky-del {
      position: absolute;
      top: 3px;
      right: 4px;
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      color: rgba(0,0,0,0.4);
      font-size: 14px;
      cursor: pointer;
      opacity: 0.35;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .sticky:hover .sticky-del { opacity: 1; }
    .sticky-del:hover { color: #000; background: rgba(0,0,0,0.06); }

    .notes-empty {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding: 6px 2px;
      font-style: italic;
      align-self: center;
    }

    .video-playlists {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .video-playlist-btn {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 7px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .video-playlist-btn.active {
      background: var(--fg);
      color: #fff;
      border-color: var(--fg);
    }

    .video-frame {
      position: relative;
      width: 100%;
      max-width: 240px;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 1px 1px rgba(0,0,0,0.04),
                  0 2px 6px rgba(0,0,0,0.06);
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-hint {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 6px;
      padding-left: 2px;
      text-align: center;
    }

    @container (max-width: 640px) {
      .page { border-radius: 0; padding-top: 24px; padding-bottom: 24px; }
      .card { padding-inline: 12px; }
      .notes-section,
      .video-section,
      .perplexity-section {
        padding-inline: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="card">
      <div class="wallclock" data-section="time">
        <div class="wallclock-label">Current Time</div>
        <div class="wallclock-body">
          <span class="wallclock-time" id="clockTime">—</span>
          <span class="wallclock-date" id="clockDate">Eastern Time</span>
        </div>
      </div>

      <div class="dial-col" data-section="pomodoro">
        <div class="dial-label">Pomodoro Clock</div>

        <div class="dial-row">
          <div class="dial-wrap">
            <svg class="dial" viewBox="0 0 180 180" aria-hidden="true">
              <circle class="track" cx="90" cy="90" r="84"></circle>
              <circle class="progress" cx="90" cy="90" r="84" stroke-dasharray="527.79" stroke-dashoffset="0"></circle>
            </svg>
            <div class="ticks" id="ticks"></div>
            <div class="readout">
              <div class="time" id="time" contenteditable="true" spellcheck="false" inputmode="numeric" title="Click to set a custom time (MM:SS or minutes)">25:00</div>
              <div class="status" id="status">Ready</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="modes" role="tablist">
              <button class="mode active" data-mode="focus">Focus</button>
              <button class="mode" data-mode="break">Break</button>
            </div>

            <div class="controls">
              <button class="btn icon" id="reset" aria-label="Reset">
                <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>
              </button>
              <button class="btn primary" id="startPause">Start</button>
              <button class="btn icon" id="skip" aria-label="Skip">
                <svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4z"/><path d="M19 5v14"/></svg>
              </button>
            </div>

            <button class="settings-toggle" id="settingsToggle" aria-expanded="false">
              <span>Customize</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </button>

            <div class="settings" id="settings" aria-hidden="true">
              <div class="field">
                <label>Focus</label>
                <div class="stepper">
                  <button data-step="-1" data-field="focus" aria-label="Decrease focus">−</button>
                  <input type="number" id="input-focus" min="1" max="120" value="25" />
                  <button data-step="1" data-field="focus" aria-label="Increase focus">+</button>
                </div>
              </div>

              <div class="field">
                <label>Break</label>
                <div class="stepper">
                  <button data-step="-1" data-field="break" aria-label="Decrease break">−</button>
                  <input type="number" id="input-break" min="1" max="60" value="5" />
                  <button data-step="1" data-field="break" aria-label="Increase break">+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Perplexity search bar section -->
    <section class="perplexity-section section-block" aria-label="Perplexity search" data-section="perplexity">
      <button class="section-toggle" type="button" aria-expanded="true">
        <span class="toggle-label">Ask Perplexity</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>

      <div class="section-content">
        <form
          onsubmit="window.open('https://www.perplexity.ai/search?q=' + encodeURIComponent(this.query.value), '_blank'); return false;"
          class="perplexity-form"
        >
          <input
            type="text"
            name="query"
            placeholder="Ask a question…"
            class="perplexity-input"
          />
          <button
            type="submit"
            class="btn perplexity-btn"
          >
            Search
          </button>
        </form>
      </div>
    </section>

    <section class="notes-section section-block" aria-label="Sticky notes" data-section="notes">
      <button class="section-toggle" type="button" aria-expanded="true">
        <span class="toggle-label">Sticky Notes</span>

      }

        if (totalSec > 24 * 60 * 60) return 24 * 60 * 60;
