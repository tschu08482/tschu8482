<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fafafa;
      --fg: #0a0a0a;
      --muted: #8a8a8a;
      --line: #e5e5e5;
      --embed-w: 760px;
      --space-1: clamp(4px, calc(var(--embed-w) * 0.006), 6px);
      --space-2: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
      --space-3: clamp(10px, calc(var(--embed-w) * 0.016), 14px);
      --space-4: clamp(12px, calc(var(--embed-w) * 0.022), 18px);
      --space-5: clamp(16px, calc(var(--embed-w) * 0.03), 24px);
      --dial-size: clamp(118px, calc(var(--embed-w) * 0.22), 168px);
      --wallclock-size: clamp(30px, calc(var(--embed-w) * 0.06), 44px);
      --timer-size: clamp(26px, calc(var(--embed-w) * 0.05), 34px);
      --label-size: clamp(7px, calc(var(--embed-w) * 0.0105), 8px);
      --button-size: clamp(9px, calc(var(--embed-w) * 0.012), 10px);
      --tick-origin: calc(var(--dial-size) * 0.475);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-2);
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      width: 100%;
      max-width: 100%;
      position: relative;
      container-type: inline-size;
      border-radius: 18px;
      border: 1px solid var(--line);
      padding-top: 40px;
    }

    .collapse-btn {
      position: absolute;
      top: 14px;
      left: 16px;
      z-index: 10;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .collapse-btn:hover { color: var(--fg); border-color: var(--fg); }
    .collapse-btn svg {
      width: 10px;
      height: 10px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s ease;
    }

    .page.collapsed .collapse-btn svg { transform: rotate(180deg); }
    .page.collapsed .card,
    .page.collapsed .notes-section,
    .page.collapsed .video-section {
      display: none;
    }

    .header-title {
      font-size: clamp(20px, calc(var(--embed-w) * 0.032), 26px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 52px 4px;
    }

    .header-rule {
      height: 1px;
      background: var(--line);
      margin: 0 52px 10px;
    }

    .card {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(300px, 1.1fr);
      align-items: stretch;
      gap: var(--space-5);
      padding: clamp(14px, calc(var(--embed-w) * 0.022), 20px);
      width: 100%;
      margin: 0 auto;
    }

    .wallclock,
    .dial-col { min-width: 0; }

    .wallclock {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding-right: var(--space-4);
      padding-left: 52px;
      border-right: 1px solid var(--line);
      min-height: var(--dial-size);
    }

    .wallclock-label {
      font-size: var(--label-size);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--fg);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .dial-col {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding-right: 52px;
    }

    .dial-label {
      font-size: var(--label-size);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--fg);
      font-weight: 700;
      padding-left: 2px;
      margin-bottom: 6px;
    }

    .dial-row {
      display: grid;
      grid-template-columns: minmax(0, var(--dial-size)) minmax(0, 1fr);
      align-items: center;
      justify-content: center;
      gap: var(--space-5);
    }

    .dial-wrap {
      position: relative;
      width: var(--dial-size);
      height: var(--dial-size);
      justify-self: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg.dial {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .track {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .progress {
      fill: none;
      stroke: var(--fg);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear;
    }

    .ticks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 4px;
      width: 1px;
      height: 5px;
      background: #d5d5d5;
      transform-origin: 50% var(--tick-origin);
    }

    .tick.major { background: #a5a5a5; height: 7px; }

    .readout {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 200;
      font-size: var(--timer-size);
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      cursor: text;
