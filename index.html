<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pomodoro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #ffffff;
    --surface: #fafafa;
    --fg: #0a0a0a;
    --muted: #8a8a8a;
    --line: #e5e5e5;
    --accent: #000000;
    --embed-w: 760px;
    --space-1: clamp(4px, calc(var(--embed-w) * 0.006), 6px);
    --space-2: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
    --space-3: clamp(10px, calc(var(--embed-w) * 0.016), 14px);
    --space-4: clamp(12px, calc(var(--embed-w) * 0.022), 18px);
    --space-5: clamp(16px, calc(var(--embed-w) * 0.03), 24px);
    --dial-size: clamp(118px, calc(var(--embed-w) * 0.22), 168px);
    --wallclock-size: clamp(30px, calc(var(--embed-w) * 0.06), 44px);
    --timer-size: clamp(26px, calc(var(--embed-w) * 0.05), 34px);
    --label-size: clamp(7px, calc(var(--embed-w) * 0.0105), 8px);
    --micro-size: clamp(6px, calc(var(--embed-w) * 0.009), 7px);
    --button-size: clamp(9px, calc(var(--embed-w) * 0.012), 10px);
    --tick-origin: calc(var(--dial-size) * 0.475);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: var(--space-2);
    min-height: 100vh;
  }

  .page {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    width: 100%;
    max-width: 100%;
    position: relative;
    container-type: inline-size;
  }

  .collapse-btn {
    position: absolute;
    top: var(--space-2);
    left: var(--space-3);
    z-index: 10;
    width: clamp(20px, calc(var(--embed-w) * 0.03), 24px);
    height: clamp(20px, calc(var(--embed-w) * 0.03), 24px);
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .collapse-btn:hover { color: var(--fg); border-color: var(--fg); }
  .collapse-btn svg {
    width: 10px;
    height: 10px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.2s ease;
  }
  .page.collapsed .collapse-btn svg { transform: rotate(180deg); }
  .page.collapsed .dial-col { display: none; }
  .page.collapsed .wallclock {
    border-right: none;
    padding-right: 0;
    padding-left: clamp(28px, calc(var(--embed-w) * 0.045), 36px);
  }

  .card {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) minmax(300px, 1.1fr);
    align-items: stretch;
    gap: var(--space-5);
    padding: clamp(14px, calc(var(--embed-w) * 0.022), 20px);
    background: var(--bg);
    width: 100%;
    margin: 0 auto;
  }

  .wallclock,
  .dial-col {
    min-width: 0;
  }

  .dial-col {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: var(--space-2);
    align-self: stretch;
    min-width: 0;
  }

  .dial-row {
    display: grid;
    grid-template-columns: minmax(0, var(--dial-size)) minmax(0, 1fr);
    align-items: center;
    justify-content: center;
    gap: var(--space-5);
    flex: 1;
    min-width: 0;
  }

  .dial-wrap {
    position: relative;
    width: var(--dial-size);
    height: var(--dial-size);
    min-width: 0;
    justify-self: center;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg.dial {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .track {
    fill: none;
    stroke: var(--line);
    stroke-width: 2;
  }

  .progress {
    fill: none;
    stroke: var(--fg);
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear;
  }

  .ticks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .tick {
    position: absolute;
    left: 50%;
    top: 4px;
    width: 1px;
    height: 5px;
    background: #d5d5d5;
    transform-origin: 50% var(--tick-origin);
  }

  .tick.major { background: #a5a5a5; height: 7px; }

  .readout {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 200;
    font-size: var(--timer-size);
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    cursor: text;
    padding: 2px 4px;
    border-radius: 4px;
    outline: none;
    transition: background 0.15s ease, box-shadow 0.15s ease;
    caret-color: var(--fg);
    white-space: nowrap;
  }
  .time:hover { background: #f4f4f4; }
  .time:focus { background: #f0f0f0; box-shadow: 0 0 0 1px var(--line); }

  .status,
  .panel-title,
  .dial-heading,
  .wallclock-title,
  .brand {
    font-size: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--fg);
    font-weight: 700;
  }

  .panel {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: var(--space-2);
    position: relative;
    padding-right: var(--space-4);
    border-right: 1px solid var(--line);
    flex-shrink: 0;
    align-self: stretch;
  }

  .panel-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    min-width: 0;
    width: 100%;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: var(--space-2);
  }

  .dial-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wallclock {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    gap: var(--space-2);
    padding-right: var(--space-4);
    padding-left: clamp(28px, calc(var(--embed-w) * 0.04), 34px);
    border-right: 1px solid var(--line);
    align-self: stretch;
    min-height: var(--dial-size);
  }

  .wallclock-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    text-align: center;
  }

  .wallclock-time {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    font-size: var(--wallclock-size);
    line-height: 1;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .wallclock-date {
    font-size: clamp(9px, calc(var(--embed-w) * 0.015), 11px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
  }

  .modes {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 2px;
    border-radius: 999px;
    width: 100%;
    overflow: hidden;
  }

  .mode {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: clamp(5px, calc(var(--embed-w) * 0.008), 6px) clamp(8px, calc(var(--embed-w) * 0.015), 12px);
    font-size: var(--label-size);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.2s ease, background 0.2s ease;
    flex: 1 1 0;
    min-width: 0;
    white-space: nowrap;
  }

  .mode:hover { color: var(--fg); }
  .mode.active { background: var(--fg); color: #fff; }

  .controls {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: var(--space-2);
    align-items: center;
    width: 100%;
  }

  .btn {
    font-family: inherit;
    font-size: var(--button-size);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    padding: clamp(8px, calc(var(--embed-w) * 0.012), 10px) clamp(14px, calc(var(--embed-w) * 0.022), 18px);
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--fg);
    min-width: 0;
    white-space: nowrap;
  }

  .btn:hover { border-color: #b5b5b5; }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--fg);
    color: #fff;
    border-color: var(--fg);
    min-width: 0;
    width: 100%;
  }
  .btn.primary:hover { background: #222; }

  .btn.icon {
    width: clamp(30px, calc(var(--embed-w) * 0.042), 34px);
    height: clamp(30px, calc(var(--embed-w) * 0.042), 34px);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn.icon svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: var(--micro-size);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta span b {
    color: var(--fg);
    font-weight: 500;
    margin-left: 5px;
  }

  .settings-toggle {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: var(--label-size);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: color 0.2s ease;
  }

  .settings-toggle:hover { color: var(--fg); }

  .settings-toggle svg {
    width: 8px; height: 8px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    transition: transform 0.3s ease;
  }

  .settings-toggle.open svg { transform: rotate(180deg); }

  .settings {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-2);
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
    padding: 0;
    border-top: 1px solid var(--line);
    border-bottom: 0;
  }

  .settings.open {
    max-height: 260px;
    opacity: 1;
    padding: 12px 0 4px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .field label {
    font-size: clamp(6px, calc(var(--embed-w) * 0.008), 7px);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stepper {
    display: flex;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--surface);
    overflow: hidden;
  }

  .stepper button {
    width: clamp(18px, calc(var(--embed-w) * 0.026), 20px);
    height: clamp(22px, calc(var(--embed-w) * 0.03), 24px);
    border: none;
    background: transparent;
    color: var(--fg);
    font-size: clamp(10px, calc(var(--embed-w) * 0.014), 11px);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s ease;
  }

  .stepper button:hover { background: #f0f0f0; }
  .stepper button:disabled { color: #ccc; cursor: not-allowed; background: transparent; }

  .stepper input {
    flex: 1;
    width: 100%;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--fg);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: var(--button-size);
    font-weight: 400;
    padding: 0;
    -moz-appearance: textfield;
  }

  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .stepper input:focus { outline: none; }

  @container (max-width: 640px) {
    .card {
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }

    .wallclock {
      border-right: none;
      border-bottom: 1px solid var(--line);
      padding-right: 0;
      padding-left: clamp(28px, calc(var(--embed-w) * 0.04), 34px);
      padding-bottom: var(--space-4);
      min-height: auto;
    }

    .dial-row {
      grid-template-columns: 1fr;
      justify-items: center;
    }

    .panel-body {
      max-width: min(100%, 320px);
      margin: 0 auto;
    }
  }

  @container (max-width: 430px) {
    .card {
      padding-top: calc(var(--space-4) + 10px);
    }

    .wallclock-time,
    .wallclock-date,
    .time {
      white-space: normal;
      text-align: center;
    }

    .mode {
      letter-spacing: 0.08em;
      padding-inline: 6px;
    }

    .btn {
      letter-spacing: 0.16em;
    }
  }



  .notes-section {
    width: 100%;
    margin-top: var(--space-4);
    padding: var(--space-4) clamp(14px, calc(var(--embed-w) * 0.022), 20px) 0;
    border-top: 1px solid var(--line);
  }

  .notes-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-3);
    padding-left: clamp(28px, calc(var(--embed-w) * 0.04), 34px);
  }

  .notes-title {
    font-size: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--fg);
    font-weight: 700;
  }

  .notes-shell {
    width: 100%;
    min-width: 0;
  }

:root {
    --bg: #ffffff;
    --surface: #fafafa;
    --fg: #0a0a0a;
    --muted: #8a8a8a;
    --line: #e5e5e5;
  }

.notes-shell * { box-sizing: border-box; margin: 0; padding: 0; }

.notes-shell, .notes-shell body {
    min-height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

.notes-shell {
    padding: 16px 20px;
  }

.notes-shell .notes {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

.notes-shell .notes-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

.notes-shell .notes-title {
    font-size: 10px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--fg);
    font-weight: 700;
  }

.notes-shell .notes-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .notes-add,
.notes-shell .notes-clear {
    height: 20px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--fg);
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

.notes-shell .notes-add {
    width: 20px;
    font-size: 13px;
  }

.notes-shell .notes-clear {
    padding: 0 8px;
    font-size: 7px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }

.notes-shell .notes-add:hover { background: var(--fg); color: #fff; border-color: var(--fg); }
.notes-shell .notes-clear:hover { color: #b00020; border-color: #b00020; }
.notes-shell .notes-clear:disabled { opacity: 0.35; cursor: not-allowed; }
.notes-shell .notes-clear:disabled:hover { color: var(--muted); border-color: var(--line); }
.notes-shell .notes-clear.armed {
    background: #b00020;
    color: #fff;
    border-color: #b00020;
  }
.notes-shell .notes-clear.armed:hover { color: #fff; }

.notes-shell .notes-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    padding: 8px 2px 6px;
    min-height: 60px;
  }

.notes-shell .sticky {
    position: relative;
    width: 100%;
    height: 130px;
    background: #fff9c4;
    border-radius: 4px;
    padding: 10px 12px 8px;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.04),
      0 2px 6px rgba(0,0,0,0.06),
      0 8px 14px -6px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    font-family: 'Inter', sans-serif;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    cursor: grab;
  }

.notes-shell .sticky:active { cursor: grabbing; }

.notes-shell .sticky:nth-child(4n+1) { background: #fff9c4; transform: rotate(-1.4deg); }
.notes-shell .sticky:nth-child(4n+2) { background: #ffe0b2; transform: rotate(1.2deg); }
.notes-shell .sticky:nth-child(4n+3) { background: #ffccbc; transform: rotate(-0.6deg); }
.notes-shell .sticky:nth-child(4n) { background: #dcedc8; transform: rotate(1.6deg); }

.notes-shell .sticky:hover {
    transform: rotate(0deg) translateY(-2px);
    box-shadow:
      0 2px 2px rgba(0,0,0,0.05),
      0 6px 12px rgba(0,0,0,0.08),
      0 14px 20px -8px rgba(0,0,0,0.12);
    z-index: 2;
  }

.notes-shell .sticky.dragging {
    opacity: 0.4;
    transform: rotate(0deg) scale(0.98);
    cursor: grabbing;
  }

.notes-shell .sticky.drop-target {
    box-shadow:
      0 0 0 2px var(--fg),
      0 2px 6px rgba(0,0,0,0.06),
      0 8px 14px -6px rgba(0,0,0,0.08);
  }

.notes-shell .sticky-text {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 11px;
    line-height: 1.4;
    color: #1a1a1a;
    padding: 0 20px 0 0;
    width: 100%;
    min-height: 26px;
    cursor: text;
  }

.notes-shell .sticky-text::placeholder { color: rgba(0,0,0,0.35); }

.notes-shell .sticky-del {
    position: absolute;
    top: 3px;
    right: 4px;
    width: 16px;
    height: 16px;
    border: none;
    background: transparent;
    color: rgba(0,0,0,0.4);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    opacity: 0.35;
    z-index: 2;
    transition: opacity 0.15s ease, color 0.15s ease, background 0.15s ease;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
.notes-shell .sticky:hover .sticky-del { opacity: 1; }
.notes-shell .sticky-del:hover { color: #000; background: rgba(0,0,0,0.06); }

.notes-shell .notes-empty {
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.08em;
    padding: 6px 2px;
    font-style: italic;
    align-self: center;
  }
</style>
</head>
<body>
  <div class="page" id="page">

    <button class="collapse-btn" id="collapseBtn" aria-label="Collapse widget" title="Collapse">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 15l6-6 6 6"/>
      </svg>
    </button>

    <div class="card">
      <div class="wallclock">
        <span class="wallclock-title">Current Time</span>
        <div class="wallclock-body">
          <span class="wallclock-time" id="clockTime">—</span>
          <span class="wallclock-date" id="clockDate">Eastern Time</span>
        </div>
      </div>

      <div class="dial-col">
        <div class="dial-heading">Pomodoro Clock</div>
        <div class="dial-row">
          <div class="dial-wrap">
            <svg class="dial" viewBox="0 0 180 180" aria-hidden="true">
              <circle class="track" cx="90" cy="90" r="84"></circle>
              <circle class="progress" cx="90" cy="90" r="84"
                      stroke-dasharray="527.79" stroke-dashoffset="0"></circle>
            </svg>
            <div class="ticks" id="ticks"></div>
            <div class="readout">
              <div class="time" id="time" contenteditable="true" spellcheck="false" inputmode="numeric" title="Click to set a custom time (MM:SS or minutes)">25:00</div>
              <div class="status" id="status">Ready</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="modes" role="tablist">
              <button class="mode active" data-mode="focus" data-min="25">Focus</button>
              <button class="mode" data-mode="short" data-min="5">Short</button>

<script>
(function () {
  const notesListEl  = document.getElementById('notesList');
  const notesAddEl   = document.getElementById('notesAdd');
  const notesClearEl = document.getElementById('notesClear');
  let notes = JSON.parse(localStorage.getItem('pomodoro-notes') || '[]');

  function saveNotes() {
    localStorage.setItem('pomodoro-notes', JSON.stringify(notes));
    updateClearButton();
  }

  function updateClearButton() {
    if (notesClearEl) notesClearEl.disabled = notes.length === 0;
  }

  function renderNotes() {
    notesListEl.innerHTML = '';
    if (notes.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'notes-empty';
      empty.textContent = 'Tap + to add a sticky';
      notesListEl.appendChild(empty);
      return;
    }
    notes.forEach((n, idx) => {
      const s = document.createElement('div');
      s.className = 'sticky';
      s.setAttribute('draggable', 'true');
      s.dataset.idx = idx;

      const del = document.createElement('button');
      del.className = 'sticky-del';
      del.setAttribute('aria-label', 'Delete note');
      del.textContent = '×';
      del.setAttribute('draggable', 'false');
      del.addEventListener('mousedown', (e) => e.stopPropagation());
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        notes.splice(idx, 1);
        saveNotes();
        renderNotes();
      });

      const ta = document.createElement('textarea');
      ta.className = 'sticky-text';
      ta.value = n;
      ta.placeholder = 'Write…';
      ta.addEventListener('mousedown', (e) => e.stopPropagation());
      ta.addEventListener('focus', () => { s.setAttribute('draggable', 'false'); });
      ta.addEventListener('blur',  () => { s.setAttribute('draggable', 'true'); });
      ta.addEventListener('input', () => {
        notes[idx] = ta.value;
        saveNotes();
      });

      s.addEventListener('dragstart', (e) => {
        s.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
      });
      s.addEventListener('dragend', () => {
        s.classList.remove('dragging');
        document.querySelectorAll('.sticky.drop-target').forEach(el => el.classList.remove('drop-target'));
      });
      s.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (!s.classList.contains('dragging')) s.classList.add('drop-target');
      });
      s.addEventListener('dragleave', () => {
        s.classList.remove('drop-target');
      });
      s.addEventListener('drop', (e) => {
        e.preventDefault();
        s.classList.remove('drop-target');
        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
        const toIdx = idx;
        if (isNaN(fromIdx) || fromIdx === toIdx) return;
        const [moved] = notes.splice(fromIdx, 1);
        notes.splice(toIdx, 0, moved);
        saveNotes();
        renderNotes();
      });

      s.appendChild(del);
      s.appendChild(ta);
      notesListEl.appendChild(s);
    });
  }

  // Two-step in-page confirm (window.confirm is blocked in many embed iframes)
  let clearArmed = false;
  let clearArmedTimer = null;
  const clearOriginalText = notesClearEl.textContent;

  function disarmClear() {
    clearArmed = false;
    if (clearArmedTimer) { clearTimeout(clearArmedTimer); clearArmedTimer = null; }
    notesClearEl.textContent = clearOriginalText;
    notesClearEl.classList.remove('armed');
  }

  notesClearEl.addEventListener('click', (e) => {
    e.stopPropagation();
    if (notes.length === 0) return;
    if (!clearArmed) {
      clearArmed = true;
      notesClearEl.textContent = 'Confirm?';
      notesClearEl.classList.add('armed');
      clearArmedTimer = setTimeout(disarmClear, 3000);
      return;
    }
    notes = [];
    saveNotes();
    renderNotes();
    disarmClear();
  });

  document.addEventListener('click', (e) => {
    if (clearArmed && e.target !== notesClearEl) disarmClear();
  });

  notesAddEl.addEventListener('click', () => {
    notes.push('');
    saveNotes();
    renderNotes();
    const stickies = notesListEl.querySelectorAll('.sticky-text');
    if (stickies.length) stickies[stickies.length - 1].focus();
  });

  renderNotes();
  updateClearButton();
})();

<script>
(() => {
  const timeEl = document.getElementById('time');
  const statusEl = document.getElementById('status');
  const startPauseBtn = document.getElementById('startPause');
  const resetBtn = document.getElementById('reset');
  const skipBtn = document.getElementById('skip');
  const progressEl = document.querySelector('.progress');
  const modeBtns = document.querySelectorAll('.mode');
  const ticksEl = document.getElementById('ticks');

  const pageRoot = document.getElementById('page');
  function updateEmbedWidth() {
    const target = pageRoot || document.documentElement;
    const width = Math.max(320, Math.round(target.getBoundingClientRect().width || window.innerWidth || 760));
    document.documentElement.style.setProperty('--embed-w', width + 'px');
  }
  updateEmbedWidth();
  window.addEventListener('resize', updateEmbedWidth);
  if (window.ResizeObserver && pageRoot) {
    new ResizeObserver(updateEmbedWidth).observe(pageRoot);
  }

  // Build tick marks
  const TICKS = 60;
  for (let i = 0; i < TICKS; i++) {
    const t = document.createElement('div');
    t.className = 'tick' + (i % 5 === 0 ? ' major' : '');
    t.style.transform = `translateX(-50%) rotate(${(i / TICKS) * 360}deg)`;
    ticksEl.appendChild(t);
  }

  const CIRC = 2 * Math.PI * 84;
  progressEl.style.strokeDasharray = CIRC;

  const LIMITS    = { focus: [1, 120], short: [1, 60], long: [1, 60] };
  const DEFAULTS  = { focus: 25, short: 5, long: 15 };
  const stored    = JSON.parse(localStorage.getItem('pomodoro-durations') || '{}');
  const MINUTES   = { ...DEFAULTS, ...stored };
  const DURATIONS = {
    get focus() { return MINUTES.focus * 60; },
    get short() { return MINUTES.short * 60; },
    get long()  { return MINUTES.long  * 60; },
  };
  const LABELS   = { focus: 'Focus', short: 'Short break', long: 'Long break' };

  document.querySelectorAll('.mode').forEach(b => {
    b.dataset.min = MINUTES[b.dataset.mode];
  });
  ['focus','short','long'].forEach(k => {
    const el = document.getElementById('input-' + k);
    if (el) el.value = MINUTES[k];
  });

  let mode = 'focus';
  let total, remaining;
  let running = false;
  let intervalId = null;
  total = DURATIONS[mode];
  remaining = total;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function render() {
    if (document.activeElement !== timeEl) {
      timeEl.textContent = fmt(remaining);
    }
    const pct = total > 0 ? remaining / total : 0;
    progressEl.style.strokeDashoffset = CIRC * (1 - pct);
    document.title = `${fmt(remaining)} — ${LABELS[mode]}`;
    statusEl.textContent = running ? LABELS[mode] : (remaining === total ? 'Ready' : 'Paused');
    startPauseBtn.textContent = running ? 'Pause' : (remaining === total ? 'Start' : 'Resume');
  }

  function parseTimeInput(str) {
    if (!str) return null;
    const cleaned = str.trim().replace(/[^0-9:]/g, '');
    if (!cleaned) return null;
    let mins = 0, secs = 0;
    if (cleaned.includes(':')) {
      const parts = cleaned.split(':');
      mins = parseInt(parts[0], 10) || 0;
      secs = parseInt(parts[1], 10) || 0;
    } else {
      mins = parseInt(cleaned, 10) || 0;
    }
    const totalSec = mins * 60 + secs;
    if (totalSec <= 0) return null;
    if (totalSec > 24 * 60 * 60) return 24 * 60 * 60;
    return totalSec;
  }

  function commitTimeEdit() {
    const parsed = parseTimeInput(timeEl.textContent);
    if (parsed === null) {
      // invalid — revert
      timeEl.textContent = fmt(remaining);
      return;
    }
    // Adopt custom duration; stop any running timer
    running = false;
    clearInterval(intervalId);
    total = parsed;
    remaining = parsed;
    // Deselect any active mode tab since this is a custom time
    modeBtns.forEach(b => b.classList.remove('active'));
    render();
  }

  function setMode(next) {
    mode = next;
    total = DURATIONS[mode];
    remaining = total;
    running = false;
    clearInterval(intervalId);
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    render();
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(intervalId);
      running = false;
      onComplete();
      return;
    }
    remaining -= 1;
    render();
  }

  function start() {
    if (running) return;
    running = true;
    intervalId = setInterval(tick, 1000);
    render();
  }

  function pause() {
    running = false;
    clearInterval(intervalId);
    render();
  }

  function reset() {
    running = false;
    clearInterval(intervalId);
    remaining = total;
    render();
  }

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.value = 0.9;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 2200;
      filter.Q.value = 0.4;
      master.connect(filter).connect(ctx.destination);

      const notes = [
        { freq: 1046.50, start: 0.00, dur: 2.4, gain: 0.14 },
        { freq: 1567.98, start: 0.35, dur: 2.0, gain: 0.09 },
      ];

      notes.forEach(n => {
        const o1 = ctx.createOscillator();
        o1.type = 'sine';
        o1.frequency.value = n.freq;
        const o2 = ctx.createOscillator();
        o2.type = 'sine';
        o2.frequency.value = n.freq * 2;
        const g1 = ctx.createGain();
        const g2 = ctx.createGain();

        g1.gain.setValueAtTime(0.0001, now + n.start);
        g1.gain.exponentialRampToValueAtTime(n.gain, now + n.start + 0.06);
        g1.gain.exponentialRampToValueAtTime(0.0001, now + n.start + n.dur);

        g2.gain.setValueAtTime(0.0001, now + n.start);
        g2.gain.exponentialRampToValueAtTime(n.gain * 0.25, now + n.start + 0.06);
        g2.gain.exponentialRampToValueAtTime(0.0001, now + n.start + n.dur * 0.7);

        o1.connect(g1).connect(master);
        o2.connect(g2).connect(master);

        o1.start(now + n.start);
        o2.start(now + n.start);
        o1.stop(now + n.start + n.dur + 0.1);
        o2.stop(now + n.start + n.dur + 0.1);
      });

      setTimeout(() => ctx.close(), 3200);
    } catch (e) {}
  }

  function onComplete() {
    beep();
    pauseMusic();
    if (mode === 'focus') {
      setMode('short');
    } else {
      setMode('focus');
    }
  }

  function skip() {
    remaining = 0;
    running = false;
    clearInterval(intervalId);
    onComplete();
  }

  startPauseBtn.addEventListener('click', () => {
    if (running) { pause(); pauseMusic(); }
    else         { start(); playMusic(); }
  });
  resetBtn.addEventListener('click', () => { reset(); pauseMusic(); });
  skipBtn.addEventListener('click', skip);
  modeBtns.forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));

  // Editable time readout — click and type MM:SS or minutes
  timeEl.addEventListener('focus', () => {
    // stop the timer while editing so the value doesn't change under the cursor
    if (running) { pause(); pauseMusic(); }
    // select all for easy overwrite
    const range = document.createRange();
    range.selectNodeContents(timeEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
  timeEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      timeEl.blur();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      timeEl.textContent = fmt(remaining);
      timeEl.blur();
    }
  });
  timeEl.addEventListener('blur', commitTimeEdit);

  document.addEventListener('keydown', (e) => {
    // ignore shortcuts while editing the time readout
    if (document.activeElement === timeEl) return;
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;
    if (e.code === 'Space') { e.preventDefault(); running ? pause() : start(); }
    if (e.key.toLowerCase() === 'r') reset();
    if (e.key.toLowerCase() === 's') skip();
  });

  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel  = document.getElementById('settings');

  settingsToggle.addEventListener('click', () => {
    const open = settingsPanel.classList.toggle('open');
    settingsToggle.classList.toggle('open', open);
    settingsToggle.setAttribute('aria-expanded', open);
    settingsPanel.setAttribute('aria-hidden', !open);
  });

  function saveDurations() {
    localStorage.setItem('pomodoro-durations', JSON.stringify(MINUTES));
  }

  function applyDuration(field, minutes) {
    const [min, max] = LIMITS[field];
    minutes = Math.max(min, Math.min(max, Math.round(minutes || min)));
    MINUTES[field] = minutes;
    document.getElementById('input-' + field).value = minutes;
    const btn = document.querySelector(`.mode[data-mode="${field}"]`);
    if (btn) btn.dataset.min = minutes;
    saveDurations();
    if (mode === field && !running && remaining === total) {
      total = DURATIONS[mode];
      remaining = total;
      render();
    } else if (mode === field && !running) {
      total = DURATIONS[mode];
      if (remaining > total) remaining = total;
      render();
    }
  }

  document.querySelectorAll('.stepper button').forEach(btn => {
    btn.addEventListener('click', () => {
      const field = btn.dataset.field;
      const step  = parseInt(btn.dataset.step, 10);
      applyDuration(field, MINUTES[field] + step);
    });
  });

  ['focus','short','long'].forEach(field => {
    const el = document.getElementById('input-' + field);
    el.addEventListener('change', () => applyDuration(field, parseInt(el.value, 10)));
    el.addEventListener('blur',   () => applyDuration(field, parseInt(el.value, 10)));
  });

  render();

  // -------- Live wall clock (America/New_York) --------
  const clockTimeEl = document.getElementById('clockTime');
  const clockDateEl = document.getElementById('clockDate');
  function updateClock() {
    try {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
      });
      const date = now.toLocaleDateString('en-US', {
        timeZone: 'America/New_York',
        weekday: 'long',
        month: 'long',
        day: 'numeric',
      });
      clockTimeEl.textContent = time;
      clockDateEl.textContent = `${date} · ET`;
    } catch (e) {
      clockTimeEl.textContent = '';
      clockDateEl.textContent = 'Eastern Time';
    }
  }
  updateClock();
  setInterval(updateClock, 15000);

  // Music removed — no-op stubs so timer wiring stays intact
  window.playMusic  = function () {};
  window.pauseMusic = function () {};

  // -------- Collapse toggle --------
  const pageEl      = document.getElementById('page');
  const collapseBtn = document.getElementById('collapseBtn');
  function setCollapsed(collapsed) {
    pageEl.classList.toggle('collapsed', collapsed);
    collapseBtn.setAttribute('aria-label', collapsed ? 'Expand widget' : 'Collapse widget');
    collapseBtn.setAttribute('title', collapsed ? 'Expand' : 'Collapse');
    try { localStorage.setItem('pomodoro-collapsed', collapsed ? '1' : '0'); } catch (e) {}
  }
  collapseBtn.addEventListener('click', () => {
    setCollapsed(!pageEl.classList.contains('collapsed'));
  });
  try {
    if (localStorage.getItem('pomodoro-collapsed') === '1') setCollapsed(true);
  } catch (e) {}
})();


(function () {
  const notesListEl  = document.getElementById('notesList');
  const notesAddEl   = document.getElementById('notesAdd');
  const notesClearEl = document.getElementById('notesClear');
  let notes = JSON.parse(localStorage.getItem('pomodoro-notes') || '[]');

  function saveNotes() {
    localStorage.setItem('pomodoro-notes', JSON.stringify(notes));
    updateClearButton();
  }

  function updateClearButton() {
    if (notesClearEl) notesClearEl.disabled = notes.length === 0;
  }

  function renderNotes() {
    notesListEl.innerHTML = '';
    if (notes.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'notes-empty';
      empty.textContent = 'Tap + to add a sticky';
      notesListEl.appendChild(empty);
      return;
    }
    notes.forEach((n, idx) => {
      const s = document.createElement('div');
      s.className = 'sticky';
      s.setAttribute('draggable', 'true');
      s.dataset.idx = idx;

      const del = document.createElement('button');
      del.className = 'sticky-del';
      del.setAttribute('aria-label', 'Delete note');
      del.textContent = '×';
      del.setAttribute('draggable', 'false');
      del.addEventListener('mousedown', (e) => e.stopPropagation());
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        notes.splice(idx, 1);
        saveNotes();
        renderNotes();
      });

      const ta = document.createElement('textarea');
      ta.className = 'sticky-text';
      ta.value = n;
      ta.placeholder = 'Write…';
      ta.addEventListener('mousedown', (e) => e.stopPropagation());
      ta.addEventListener('focus', () => { s.setAttribute('draggable', 'false'); });
      ta.addEventListener('blur',  () => { s.setAttribute('draggable', 'true'); });
      ta.addEventListener('input', () => {
        notes[idx] = ta.value;
        saveNotes();
      });

      s.addEventListener('dragstart', (e) => {
        s.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
      });
      s.addEventListener('dragend', () => {
        s.classList.remove('dragging');
        document.querySelectorAll('.sticky.drop-target').forEach(el => el.classList.remove('drop-target'));
      });
      s.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (!s.classList.contains('dragging')) s.classList.add('drop-target');
      });
      s.addEventListener('dragleave', () => {
        s.classList.remove('drop-target');
      });
      s.addEventListener('drop', (e) => {
        e.preventDefault();
        s.classList.remove('drop-target');
        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
        const toIdx = idx;
        if (isNaN(fromIdx) || fromIdx === toIdx) return;
        const [moved] = notes.splice(fromIdx, 1);
        notes.splice(toIdx, 0, moved);
        saveNotes();
        renderNotes();
      });

      s.appendChild(del);
      s.appendChild(ta);
      notesListEl.appendChild(s);
    });
  }

  // Two-step in-page confirm (window.confirm is blocked in many embed iframes)
  let clearArmed = false;
  let clearArmedTimer = null;
  const clearOriginalText = notesClearEl.textContent;

  function disarmClear() {
    clearArmed = false;
    if (clearArmedTimer) { clearTimeout(clearArmedTimer); clearArmedTimer = null; }
    notesClearEl.textContent = clearOriginalText;
    notesClearEl.classList.remove('armed');
  }

  notesClearEl.addEventListener('click', (e) => {
    e.stopPropagation();
    if (notes.length === 0) return;
    if (!clearArmed) {
      clearArmed = true;
      notesClearEl.textContent = 'Confirm?';
      notesClearEl.classList.add('armed');
      clearArmedTimer = setTimeout(disarmClear, 3000);
      return;
    }
    notes = [];
    saveNotes();
    renderNotes();
    disarmClear();
  });

  document.addEventListener('click', (e) => {
    if (clearArmed && e.target !== notesClearEl) disarmClear();
  });

  notesAddEl.addEventListener('click', () => {
    notes.push('');
    saveNotes();
    renderNotes();
    const stickies = notesListEl.querySelectorAll('.sticky-text');
    if (stickies.length) stickies[stickies.length - 1].focus();
  });

  renderNotes();
  updateClearButton();
})();

</script>
</body>
</html>
