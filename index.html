<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fafafa;
      --fg: #0a0a0a;
      --muted: #8a8a8a;
      --line: #e5e5e5;
      --embed-w: 760px;
      --space-1: clamp(4px, calc(var(--embed-w) * 0.006), 6px);
      --space-2: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
      --space-3: clamp(10px, calc(var(--embed-w) * 0.016), 14px);
      --space-4: clamp(12px, calc(var(--embed-w) * 0.022), 18px);
      --space-5: clamp(16px, calc(var(--embed-w) * 0.03), 24px);
      --dial-size: clamp(118px, calc(var(--embed-w) * 0.22), 168px);
      --wallclock-size: clamp(30px, calc(var(--embed-w) * 0.06), 44px);
      --timer-size: clamp(26px, calc(var(--embed-w) * 0.05), 34px);
      --label-size: clamp(9px, calc(var(--embed-w) * 0.015), 11px);
      --button-size: clamp(9px, calc(var(--embed-w) * 0.012), 10px);
      --tick-origin: calc(var(--dial-size) * 0.475);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-2);
      min-height: 100vh;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      width: 100%;
      max-width: 100%;
      container-type: inline-size;
      border-radius: 18px;
      padding: 36px 0 32px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-5);
      padding: clamp(14px, calc(var(--embed-w) * 0.022), 20px);
      width: 100%;
      max-width: 420px;
    }

    .wallclock,
    .dial-col {
      width: 100%;
      min-width: 0;
    }

    .wallclock {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-2);
      padding-inline: 24px;
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--line);
    }

    .wallclock-label,
    .dial-label,
    .toggle-label {
      font-size: var(--label-size);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg);
      font-weight: 700;
      margin-bottom: 6px;
      text-align: left;
      width: 100%;
    }

    .dial-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-3);
      padding-inline: 24px;
    }

    .dial-label {
      margin-top: var(--space-1);
    }

    .dial-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      width: 100%;
    }

    .dial-wrap {
      position: relative;
      width: var(--dial-size);
      height: var(--dial-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg.dial {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .track {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .progress {
      fill: none;
      stroke: var(--fg);
      stroke-width: 2;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear;
    }

    .ticks {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 4px;
      width: 1px;
      height: 5px;
      background: #d5d5d5;
      transform-origin: 50% var(--tick-origin);
    }

    .tick.major { background: #a5a5a5; height: 7px; }

    .readout {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 200;
      font-size: var(--timer-size);
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      cursor: text;
      padding: 2px 4px;
      border-radius: 4px;
      outline: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
      caret-color: var(--fg);
      white-space: nowrap;
    }

    .time:hover { background: #f4f4f4; }
    .time:focus { background: #f0f0f0; box-shadow: 0 0 0 1px var(--line); }

    .status {
      font-size: clamp(8px, calc(var(--embed-w) * 0.012), 10px);
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--fg);
      font-weight: 700;
    }

    .wallclock-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      width: 100%;
    }

    .wallclock-time {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: var(--wallclock-size);
      line-height: 1;
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }

    .wallclock-date {
      font-size: clamp(9px, calc(var(--embed-w) * 0.015), 11px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--fg);
      margin-top: 4px;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }

    .panel-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      width: 100%;
    }

    .modes {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 2px;
      border-radius: 999px;
      width: 100%;
      max-width: 320px;
      overflow: hidden;
    }

    .mode {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: clamp(5px, calc(var(--embed-w) * 0.008), 6px) clamp(8px, calc(var(--embed-w) * 0.015), 12px);
      font-size: clamp(7px, calc(var(--embed-w) * 0.0105), 8px);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s ease, background 0.2s ease;
      flex: 1 1 0;
      min-width: 0;
      white-space: nowrap;
    }

    .mode:hover { color: var(--fg); }
    .mode.active { background: var(--fg); color: #fff; }

    .controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      font-family: inherit;
      font-size: var(--button-size);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: clamp(8px, calc(var(--embed-w) * 0.012), 10px) clamp(14px, calc(var(--embed-w) * 0.022), 18px);
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--fg);
      white-space: nowrap;
    }

    .btn:hover { border-color: #b5b5b5; }
    .btn:active { transform: scale(0.97); }
    .btn.primary {
      background: var(--fg);
      color: #fff;
      border-color: var(--fg);
      width: 100%;
    }

    .btn.icon {
      width: 34px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn.icon svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .settings-toggle {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: clamp(7px, calc(var(--embed-w) * 0.0105), 8px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .settings-toggle svg {
      width: 8px;
      height: 8px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      transition: transform 0.3s ease;
    }

    .settings-toggle.open svg { transform: rotate(180deg); }

    .settings {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-2);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
      padding: 0;
    }

    .settings.open {
      max-height: 220px;
      opacity: 1;
      padding: 12px 0 4px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .field label {
      font-size: 7px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stepper {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      overflow: hidden;
    }

    .stepper button {
      width: 20px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--fg);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease;
    }

    .stepper button:hover { background: #f0f0f0; }

    .stepper input {
      flex: 1;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--fg);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--button-size);
      padding: 0;
      -moz-appearance: textfield;
    }

    .stepper input::-webkit-outerspin-button,
    .stepper input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .notes-section,
    .video-section,
    .perplexity-section {
      width: 100%;
      max-width: 420px;
      margin-top: var(--space-4);
      padding: var(--space-4) 24px 0;
      border-top: 1px solid var(--line);
    }

    .notes-shell,
    .video-shell {
      width: 100%;
      padding: 8px 0 0;
    }

    .video-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .notes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .section-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--space-2);
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }

    .section-toggle svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      color: var(--muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
      justify-self: end;
    }

    .section-content {
      overflow: visible;
      max-height: none;
      opacity: 1;
      transition: opacity 0.2s ease, margin-top 0.2s ease;
      margin-top: var(--space-2);
    }

    .section-block.collapsed .section-toggle svg { transform: rotate(-90deg); }

    .section-block.collapsed .section-content {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin-top: 0;
    }

    .perplexity-form {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .perplexity-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }

    .perplexity-input:focus {
      border-color: #4a72ff;
      box-shadow: 0 0 0 1px #4a72ff33;
    }

    .perplexity-btn {
      font-size: 9px;
      padding-inline: 14px;
      white-space: nowrap;
    }

    .notes-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .notes-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notes-add,
    .notes-clear {
      height: 20px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--fg);
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .notes-add { width: 20px; font-size: 13px; }

    .notes-clear {
      padding: 0 8px;
      font-size: 7px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .notes-add:hover { background: var(--fg); color: #fff; border-color: var(--fg); }
    .notes-clear:hover { color: #b00020; border-color: #b00020; }
    .notes-clear:disabled { opacity: 0.35; cursor: not-allowed; }
    .notes-clear.armed { background: #b00020; color: #fff; border-color: #b00020; }

    .notes-shell {
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .notes-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      padding: 8px 2px 6px;
      min-height: 60px;
    }

    .sticky {
      position: relative;
      width: 100%;
      height: 130px;
      background: #fff9c4;
      border-radius: 4px;
      padding: 10px 12px 8px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.04),
                  0 2px 6px rgba(0,0,0,0.06),
                  0 8px 14px -6px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      cursor: grab;
    }

    .sticky:nth-child(4n+1) { background: #fff9c4; transform: rotate(-1.4deg); }
    .sticky:nth-child(4n+2) { background: #ffe0b2; transform: rotate(1.2deg); }
    .sticky:nth-child(4n+3) { background: #ffccbc; transform: rotate(-0.6deg); }
    .sticky:nth-child(4n)   { background: #dcedc8; transform: rotate(1.6deg); }

    .sticky:hover {
      transform: rotate(0deg) translateY(-2px);
      box-shadow: 0 2px 2px rgba(0,0,0,0.05),
                  0 6px 12px rgba(0,0,0,0.08),
                  0 14px 20px -8px rgba(0,0,0,0.12);
      z-index: 2;
    }

    .sticky.dragging {
      opacity: 0.4;
      transform: rotate(0deg) scale(0.98);
    }

    .sticky.drop-target {
      box-shadow: 0 0 0 2px var(--fg),
                  0 2px 6px rgba(0,0,0,0.06),
                  0 8px 14px -6px rgba(0,0,0,0.08);
    }

    .sticky-text {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 11px;
      line-height: 1.4;
      color: #1a1a1a;
      padding: 0 20px 0 0;
      width: 100%;
      min-height: 26px;
    }

    .sticky-del {
      position: absolute;
      top: 3px;
      right: 4px;
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      color: rgba(0,0,0,0.4);
      font-size: 14px;
      cursor: pointer;
      opacity: 0.35;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .sticky:hover .sticky-del { opacity: 1; }
    .sticky-del:hover { color: #000; background: rgba(0,0,0,0.06); }

    .notes-empty {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding: 6px 2px;
      font-style: italic;
      align-self: center;
    }

    .video-playlists {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .video-playlist-btn {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-size: 7px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .video-playlist-btn.active {
      background: var(--fg);
      color: #fff;
      border-color: var(--fg);
    }

    .video-frame {
      position: relative;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 1px 1px rgba(0,0,0,0.04),
                  0 2px 6px rgba(0,0,0,0.06);
    }

    .video-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-hint {
      font-size: 8px;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 6px;
      padding-left: 2px;
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @container (max-width: 640px) {
      .page { border-radius: 0; padding-top: 24px; padding-bottom: 24px; }
      .card { padding-inline: 12px; }
      .notes-section,
      .video-section,
      .perplexity-section {
        padding-inline: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="card">
      <section class="wallclock">
        <div class="wallclock-label">Current Time</div>
        <div class="wallclock-body">
          <div class="wallclock-time" id="wallclockTime">--:--</div>
          <div class="wallclock-date" id="wallclockDate">Eastern Time</div>
        </div>
      </section>

      <section class="dial-col">
        <div class="dial-label">Pomodoro Clock</div>
        <div class="dial-row">
          <div class="dial-wrap">
            <svg class="dial" viewBox="0 0 120 120" aria-hidden="true">
              <circle class="track" cx="60" cy="60" r="54"></circle>
              <circle class="progress" id="progressRing" cx="60" cy="60" r="54"></circle>
            </svg>
            <div class="ticks" id="ticks"></div>
            <div class="readout">
              <div class="time" id="timeDisplay" contenteditable="true" spellcheck="false">25:00</div>
              <div class="status" id="statusText">Ready</div>
            </div>
          </div>

          <div class="panel-body">
            <div class="modes" role="tablist" aria-label="Timer modes">
              <button class="mode active" data-mode="focus" type="button">Focus</button>
              <button class="mode" data-mode="break" type="button">Break</button>
            </div>

            <div class="controls">
              <button class="btn icon" id="resetBtn" type="button" aria-label="Reset timer">
                <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 3v6h6"></path></svg>
              </button>
              <button class="btn primary" id="startPauseBtn" type="button">Start</button>
              <button class="btn icon" id="settingsToggle" type="button" aria-label="Customize durations">
                <svg viewBox="0 0 24 24"><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
              </button>
            </div>

            <button class="settings-toggle" id="settingsLabelToggle" type="button">
              <span class="toggle-label">Customize</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"></path></svg>
            </button>

            <div class="settings" id="settingsPanel">
              <div class="field">
                <label for="focusMinutes">Focus</label>
                <div class="stepper">
                  <button type="button" data-step="-1" data-target="focusMinutes">−</button>
                  <input id="focusMinutes" type="number" min="1" max="180" value="25">
                  <button type="button" data-step="1" data-target="focusMinutes">+</button>
                </div>
              </div>

              <div class="field">
                <label for="breakMinutes">Break</label>
                <div class="stepper">
                  <button type="button" data-step="-1" data-target="breakMinutes">−</button>
                  <input id="breakMinutes" type="number" min="1" max="60" value="5">
                  <button type="button" data-step="1" data-target="breakMinutes">+</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <section class="perplexity-section section-block" id="perplexitySection">
      <button class="section-toggle" type="button" aria-expanded="true" aria-controls="perplexityContent">
        <span class="dial-label" style="margin:0;">Perplexity Search</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
      </button>
      <div class="section-content" id="perplexityContent">
        <form class="perplexity-form" id="perplexityForm">
          <label class="sr-only" for="perplexityInput">Ask Perplexity</label>
          <input id="perplexityInput" class="perplexity-input" type="text" placeholder="Ask Perplexity anything..." autocomplete="off" required>
          <button class="btn perplexity-btn" type="submit">Search</button>
        </form>
      </div>
    </section>

    <section class="notes-section section-block" id="notesSection">
      <button class="section-toggle" type="button" aria-expanded="true" aria-controls="notesContent">
        <span class="dial-label" style="margin:0;">Sticky Notes</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
      </button>
      <div class="section-content" id="notesContent">
        <div class="notes-shell">
          <div class="notes">
            <div class="notes-header">
              <div class="notes-actions">
                <button class="notes-add" id="addNoteBtn" type="button" aria-label="Add note">+</button>
                <button class="notes-clear" id="clearNotesBtn" type="button" disabled>Clear</button>
              </div>
            </div>
            <div class="notes-list" id="notesList"></div>
            <div class="notes-empty" id="notesEmpty">No notes yet.</div>
          </div>
        </div>
      </div>
    </section>

    <section class="video-section section-block collapsed" id="videoSection">
      <button class="section-toggle" type="button" aria-expanded="false" aria-controls="videoContent">
        <span class="dial-label" style="margin:0;">Music</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
      </button>
      <div class="section-content" id="videoContent">
        <div class="video-shell">
          <div class="video-playlists" id="videoPlaylists"></div>
          <div class="video-frame">
            <iframe
              id="videoFrame"
              src="https://www.youtube-nocookie.com/embed/oPVte6aMprI?autoplay=0&rel=0&list=RDoPVte6aMprI"
              title="Music player"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen></iframe>
          </div>
          <div class="video-hint">Choose a playlist for background focus.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      durations: { focus: 25, break: 5 },
      mode: 'focus',
      totalSeconds: 25 * 60,
      remainingSeconds: 25 * 60,
      running: false,
      intervalId: null,
      clearArmed: false,
      notes: [],
      dragIndex: null
    };

    const modes = document.querySelectorAll('.mode');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusText = document.getElementById('statusText');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsLabelToggle = document.getElementById('settingsLabelToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const progressRing = document.getElementById('progressRing');
    const ticks = document.getElementById('ticks');
    const wallclockTime = document.getElementById('wallclockTime');
    const wallclockDate = document.getElementById('wallclockDate');
    const focusMinutes = document.getElementById('focusMinutes');
    const breakMinutes = document.getElementById('breakMinutes');
    const notesList = document.getElementById('notesList');
    const notesEmpty = document.getElementById('notesEmpty');
    const addNoteBtn = document.getElementById('addNoteBtn');
    const clearNotesBtn = document.getElementById('clearNotesBtn');
    const perplexityForm = document.getElementById('perplexityForm');
    const perplexityInput = document.getElementById('perplexityInput');
    const videoFrame = document.getElementById('videoFrame');
    const videoPlaylists = document.getElementById('videoPlaylists');

    const playlists = [
      { label: 'Relax', url: 'https://www.youtube-nocookie.com/embed/oPVte6aMprI?autoplay=0&rel=0&list=RDoPVte6aMprI' },
      { label: 'Country', url: 'https://www.youtube-nocookie.com/embed/TsfDpW7PYN8?autoplay=0&rel=0&list=RDTsfDpW7PYN8' }
    ];

    function createTicks() {
      ticks.innerHTML = '';
      for (let i = 0; i < 60; i++) {
        const tick = document.createElement('div');
        tick.className = 'tick' + (i % 5 === 0 ? ' major' : '');
        tick.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
        ticks.appendChild(tick);
      }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function parseTime(text) {
      const match = text.trim().match(/^(\d{1,3}):(\d{2})$/);
      if (!match) return null;
      const minutes = Number(match[1]);
      const seconds = Number(match[2]);
      if (seconds > 59) return null;
      return minutes * 60 + seconds;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(state.remainingSeconds);
      const radius = 54;
      const circumference = 2 * Math.PI * radius;
      progressRing.style.strokeDasharray = `${circumference}`;
      const ratio = state.totalSeconds > 0 ? state.remainingSeconds / state.totalSeconds : 0;
      progressRing.style.strokeDashoffset = `${circumference * (1 - ratio)}`;
      statusText.textContent = state.running ? 'Running' : (state.remainingSeconds === 0 ? 'Complete' : 'Ready');
      startPauseBtn.textContent = state.running ? 'Pause' : 'Start';
    }

    function setMode(mode) {
      state.mode = mode;
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = state.durations[mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      modes.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      updateDisplay();
    }

    function tick() {
      if (state.remainingSeconds > 0) {
        state.remainingSeconds -= 1;
        updateDisplay();
      } else {
        state.running = false;
        clearInterval(state.intervalId);
        state.intervalId = null;
        updateDisplay();
      }
    }

    function toggleTimer() {
      if (state.running) {
        state.running = false;
        clearInterval(state.intervalId);
        state.intervalId = null;
      } else {
        state.running = true;
        state.intervalId = setInterval(tick, 1000);
      }
      updateDisplay();
    }

    function resetTimer() {
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = state.durations[state.mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      updateDisplay();
    }

    function toggleSettings() {
      const isOpen = settingsPanel.classList.toggle('open');
      settingsLabelToggle.classList.toggle('open', isOpen);
    }

    function clampInputValue(input) {
      const min = Number(input.min || 1);
      const max = Number(input.max || 999);
      let value = Number(input.value || min);
      if (!Number.isFinite(value)) value = min;
      value = Math.min(max, Math.max(min, value));
      input.value = value;
      return value;
    }

    function applyDurations() {
      state.durations.focus = clampInputValue(focusMinutes);
      state.durations.break = clampInputValue(breakMinutes);
      state.totalSeconds = state.durations[state.mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      updateDisplay();
    }

    function updateWallclock() {
      const now = new Date();
      const time = new Intl.DateTimeFormat('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true,
        timeZone: 'America/New_York'
      }).format(now);
      const date = new Intl.DateTimeFormat('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        timeZone: 'America/New_York'
      }).format(now);
      wallclockTime.textContent = time;
      wallclockDate.textContent = `${date} · Eastern Time`;
    }

    function renderNotes() {
      notesList.innerHTML = '';
      notesEmpty.style.display = state.notes.length ? 'none' : 'block';
      clearNotesBtn.disabled = state.notes.length === 0;
      if (state.notes.length === 0) return;

      state.notes.forEach((note, index) => {
        const card = document.createElement('div');
        card.className = 'sticky';
        card.draggable = true;
        card.dataset.index = index;

        const del = document.createElement('button');
        del.className = 'sticky-del';
        del.type = 'button';
        del.setAttribute('aria-label', 'Delete note');
        del.textContent = '×';
        del.addEventListener('click', () => {
          state.notes.splice(index, 1);
          state.clearArmed = false;
          clearNotesBtn.classList.remove('armed');
          renderNotes();
        });

        const text = document.createElement('textarea');
        text.className = 'sticky-text';
        text.value = note;
        text.placeholder = 'Write here...';
        text.addEventListener('input', () => {
          state.notes[index] = text.value;
        });

        card.addEventListener('dragstart', () => {
          state.dragIndex = index;
          card.classList.add('dragging');
        });

        card.addEventListener('dragend', () => {
          state.dragIndex = null;
          card.classList.remove('dragging');
          document.querySelectorAll('.sticky').forEach(el => el.classList.remove('drop-target'));
        });

        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (state.dragIndex === null || state.dragIndex === index) return;
          card.classList.add('drop-target');
        });

        card.addEventListener('dragleave', () => {
          card.classList.remove('drop-target');
        });

        card.addEventListener('drop', (e) => {
          e.preventDefault();
          card.classList.remove('drop-target');
          const from = state.dragIndex;
          const to = index;
          if (from === null || from === to) return;
          const moved = state.notes.splice(from, 1)[0];
          state.notes.splice(to, 0, moved);
          renderNotes();
        });

        card.appendChild(del);
        card.appendChild(text);
        notesList.appendChild(card);
      });
    }

    function addNote() {
      state.notes.unshift('');
      state.clearArmed = false;
      clearNotesBtn.classList.remove('armed');
      renderNotes();
      const first = notesList.querySelector('.sticky-text');
      if (first) first.focus();
    }

    function clearNotes() {
      if (!state.clearArmed) {
        state.clearArmed = true;
        clearNotesBtn.classList.add('armed');
        clearNotesBtn.textContent = 'Sure?';
        setTimeout(() => {
          state.clearArmed = false;
          clearNotesBtn.classList.remove('armed');
          clearNotesBtn.textContent = 'Clear';
        }, 2500);
        return;
      }
      state.notes = [];
      state.clearArmed = false;
      clearNotesBtn.classList.remove('armed');
      clearNotesBtn.textContent = 'Clear';
      renderNotes();
    }

    function setupVideoPlaylists() {
      playlists.forEach((playlist, index) => {
        const btn = document.createElement('button');
        btn.className = 'video-playlist-btn' + (index === 0 ? ' active' : '');
        btn.type = 'button';
        btn.textContent = playlist.label;
        btn.addEventListener('click', () => {
          videoFrame.src = playlist.url;
          document.querySelectorAll('.video-playlist-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
        videoPlaylists.appendChild(btn);
      });
    }

    function handlePerplexitySearch(e) {
      e.preventDefault();
      const query = perplexityInput.value.trim();
      if (!query) return;
      const url = 'https://www.perplexity.ai/search?q=' + encodeURIComponent(query);
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function setupSectionToggles() {
      document.querySelectorAll('.section-toggle').forEach((toggle) => {
        toggle.addEventListener('click', () => {
          const block = toggle.closest('.section-block');
          if (!block) return;
          const collapsed = block.classList.toggle('collapsed');
          toggle.setAttribute('aria-expanded', String(!collapsed));
        });
      });
    }

    modes.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
    startPauseBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    settingsToggle.addEventListener('click', toggleSettings);
    settingsLabelToggle.addEventListener('click', toggleSettings);

    [focusMinutes, breakMinutes].forEach(input => {
      input.addEventListener('change', applyDurations);
      input.addEventListener('blur', applyDurations);
    });

    document.querySelectorAll('.stepper button').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const step = Number(btn.dataset.step || 0);
        target.value = Number(target.value || 0) + step;
        applyDurations();
      });
    });

    timeDisplay.addEventListener('blur', () => {
      const parsed = parseTime(timeDisplay.textContent);
      if (parsed === null || parsed <= 0) {
        updateDisplay();
        return;
      }
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = parsed;
      state.remainingSeconds = parsed;
      updateDisplay();
    });

    timeDisplay.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        timeDisplay.blur();
      }
    });

    addNoteBtn.addEventListener('click', addNote);
    clearNotesBtn.addEventListener('click', clearNotes);
    perplexityForm.addEventListener('submit', handlePerplexitySearch);

    createTicks();
    updateDisplay();
    updateWallclock();
    setInterval(updateWallclock, 1000);
    renderNotes();
    setupVideoPlaylists();
    setupSectionToggles();
  </script>
</body>
</html>
