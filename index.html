<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer Notes-First</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #fafafa;
      --fg: #0a0a0a;
      --muted: #8a8a8a;
      --line: #e5e5e5;
      --radius: 16px;
      --radius-sm: 10px;
      --label-size: 10px;
      --small: 9px;
      --timer-size: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { padding: 10px; display: flex; justify-content: center; }

    .widget {
      width: 100%;
      max-width: 380px;
      background: var(--bg);
      padding: 14px;
    }

    .clock-label, .section-title {
      font-size: var(--label-size);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--fg);
    }

    .clock-box {
      border-radius: var(--radius);
      padding: 6px 2px 8px;
      display: flex; flex-direction: column;
      gap: 4px; align-items: flex-start;
    }

    .clock-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--timer-size);
      font-weight: 300; line-height: 1;
      letter-spacing: -0.02em;
      width: 100%; text-align: center;
    }

    .clock-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      width: 100%; text-align: center;
    }

    .stack { display: grid; gap: 10px; }

    .panel, details.section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: var(--bg);
    }

    .timer-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .mode-row { display: inline-flex; gap: 4px; align-items: center; }

    .mode {
      border: 1px solid var(--line);
      background: transparent; color: var(--muted);
      border-radius: 999px; padding: 4px 9px;
      font-size: 8px; letter-spacing: 0.16em;
      text-transform: uppercase; cursor: pointer;
      font-family: inherit;
    }

    .mode.active { background: var(--fg); border-color: var(--fg); color: #fff; }

    .alarm-header-btn {
      border: 1px solid var(--line);
      background: transparent; color: var(--fg);
      border-radius: 999px; padding: 4px 10px;
      font-size: 8px; letter-spacing: 0.16em;
      text-transform: uppercase; cursor: pointer;
      font-family: inherit;
    }

    .alarm-header-btn.armed { background: #b00020; color: #fff; border-color: #b00020; }

    .timer-main { display: flex; align-items: center; gap: 8px; margin-top: 8px; }

    .timer-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--timer-size);
      font-weight: 300; line-height: 1;
      padding: 2px 6px; border-radius: 6px;
      outline: none; letter-spacing: -0.02em;
    }
    .timer-time:hover, .timer-time:focus { background: #f5f5f5; }

    .status {
      font-size: 8px; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 700; color: var(--fg);
    }

    .progress-bar {
      flex: 1; height: 5px;
      background: #f0f0f0;
      border-radius: 999px; overflow: hidden;
    }

    .progress-fill {
      width: 100%; height: 100%;
      background: var(--fg); border-radius: inherit;
      transform-origin: left center;
      transition: transform 0.9s linear;
    }

    .controls-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }

    .btn, .icon-btn, .mini-btn, .music-btn, .notes-add, .notes-clear {
      border: 1px solid var(--line);
      background: transparent; color: var(--fg);
      border-radius: 999px; cursor: pointer;
      font-family: inherit;
    }

    .btn { padding: 6px 12px; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
    .btn.primary { background: var(--fg); color: #fff; border-color: var(--fg); }

    .icon-btn { width: 28px; height: 28px; display: grid; place-items: center; }
    .icon-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    .settings {
      display: grid; gap: 8px; margin-top: 8px;
      padding-top: 8px; border-top: 1px solid var(--line);
    }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .field label {
      display: block; margin-bottom: 3px;
      font-size: 7px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
    }

    .stepper {
      display: flex; align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px; overflow: hidden;
      background: var(--surface);
    }
    .stepper button { width: 22px; height: 24px; border: none; background: transparent; cursor: pointer; font-size: 12px; }
    .stepper input {
      flex: 1; width: 100%; border: none; background: transparent;
      text-align: center; font-family: 'JetBrains Mono', monospace;
      font-size: 10px; -moz-appearance: textfield;
    }
    .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .alarm-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      display: none; align-items: center; justify-content: center;
      padding: 16px; z-index: 999;
    }
    .alarm-modal.open { display: flex; }
    .alarm-card {
      background: #fff; border-radius: 16px;
      padding: 16px; width: 100%; max-width: 300px;
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .alarm-card-title {
      font-size: 11px; letter-spacing: 0.2em;
      text-transform: uppercase; font-weight: 700; margin-bottom: 12px;
    }
    .alarm-input {
      width: 100%; border: 1px solid var(--line);
      border-radius: 10px; padding: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; text-align: center; outline: none;
    }
    .alarm-input:focus { border-color: var(--fg); }
    .alarm-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

    .alarm-countdown {
      display: none; margin-top: 8px;
      padding: 8px 10px; border: 1px dashed var(--line);
      border-radius: 10px; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--fg); text-align: center; letter-spacing: 0.05em;
    }
    .alarm-countdown.visible { display: block; }
    .alarm-countdown .cd-time { font-size: 18px; display: block; margin-top: 2px; letter-spacing: -0.02em; }

    .alert-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      display: none; align-items: center; justify-content: center;
      padding: 16px; z-index: 9999;
      backdrop-filter: blur(2px);
    }
    .alert-overlay.open { display: flex; }
    .alert-overlay.open .alert-card { animation: alertPulse 1s ease-in-out infinite; }

    .alert-card {
      background: #fff;
      border: 3px solid #b00020;
      border-radius: 20px;
      padding: 22px 20px;
      width: 100%; max-width: 320px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(176, 0, 32, 0.5);
    }

    @keyframes alertPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(176, 0, 32, 0.5); }
      50%      { transform: scale(1.04); box-shadow: 0 24px 80px rgba(176, 0, 32, 0.85); }
    }

    .alert-icon {
      width: 56px; height: 56px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: #b00020;
      display: grid; place-items: center;
      color: #fff; font-size: 30px;
      animation: bellShake 0.6s ease-in-out infinite;
    }

    @keyframes bellShake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

    .alert-title {
      font-size: 14px; letter-spacing: 0.2em;
      text-transform: uppercase; font-weight: 800;
      color: #b00020; margin-bottom: 6px;
    }
    .alert-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 400;
      color: var(--fg); margin-bottom: 4px;
    }
    .alert-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
    .alert-dismiss {
      background: #b00020; color: #fff;
      border: 1px solid #b00020;
      border-radius: 999px; padding: 10px 22px;
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .alert-dismiss:hover { background: #900018; }

    body.alarm-firing { animation: bodyFlash 1s ease-in-out infinite; }
    @keyframes bodyFlash {
      0%, 100% { background: var(--bg); }
      50% { background: #ffe5ea; }
    }

    details.section summary {
      list-style: none; cursor: pointer;
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    details.section summary::-webkit-details-marker { display: none; }
    .chev {
      width: 9px; height: 9px;
      border-right: 1.5px solid var(--muted);
      border-bottom: 1.5px solid var(--muted);
      transform: rotate(45deg);
      transition: transform 0.2s ease;
      margin-right: 4px;
    }
    details[open] .chev { transform: rotate(225deg); margin-top: 3px; }
    .section-body { margin-top: 8px; }

    .perplexity-panel { display: grid; gap: 6px; }
    .perplexity-form { display: grid; grid-template-columns: 1fr auto; gap: 6px; margin-top: 4px; }
    .perplexity-input {
      width: 100%; border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 11px;
      font-size: 10px; outline: none; font-family: inherit;
    }
    .perplexity-input:focus { border-color: #4a72ff; box-shadow: 0 0 0 1px #4a72ff33; }

    .mini-btn { padding: 8px 10px; font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; white-space: nowrap; }

    .notes-actions { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 8px; }
    .notes-add { width: 22px; height: 22px; font-size: 14px; }
    .notes-clear {
      padding: 0 8px; font-size: 8px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted); height: 22px;
    }
    .notes-clear:disabled { opacity: 0.35; cursor: not-allowed; }
    .notes-clear.armed { background: #b00020; color: #fff; border-color: #b00020; }

    .notes-list { display: block; }
    .sticky {
      position: relative; border-radius: 10px; padding: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 6px 14px rgba(0,0,0,0.06);
      margin-bottom: 8px; min-height: 72px;
    }
    .sticky:nth-child(4n+1) { background: #fff9c4; }
    .sticky:nth-child(4n+2) { background: #ffe0b2; }
    .sticky:nth-child(4n+3) { background: #ffccbc; }
    .sticky:nth-child(4n)   { background: #dcedc8; }

    .sticky-text {
      width: 100%; min-height: 56px;
      border: none; background: transparent;
      resize: none; outline: none;
      font-size: 11px; line-height: 1.35;
      padding-right: 18px; font-family: inherit;
    }
    .sticky-del {
      position: absolute; top: 4px; right: 4px;
      width: 16px; height: 16px; border: none;
      background: transparent; font-size: 14px;
      color: rgba(0,0,0,0.45); cursor: pointer;
    }
    .notes-empty {
      color: var(--muted); font-size: 9px;
      letter-spacing: 0.08em; font-style: italic; padding-top: 2px;
    }

    .music-row { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .music-btn { padding: 5px 9px; font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .music-btn.active { background: var(--fg); color: #fff; border-color: var(--fg); }

    .video-frame {
      position: relative; width: 100%;
      aspect-ratio: 16 / 9; border-radius: 12px;
      overflow: hidden; border: 1px solid var(--line); background: #000;
    }
    .video-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
    .video-hint { margin-top: 6px; text-align: center; color: var(--muted); font-size: 8px; letter-spacing: 0.08em; }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="clock-box">
      <div class="clock-label">Current Time</div>
      <div class="clock-time" id="wallclockTime">--:--</div>
      <div class="clock-date" id="wallclockDate">Eastern Time</div>
    </div>

    <div class="stack" style="margin-top: 10px;">
      <section class="panel">
        <div class="timer-row">
          <div class="section-title">Timer</div>
          <div class="mode-row" role="tablist" aria-label="Timer modes">
            <button class="mode active" data-mode="focus" type="button">Focus</button>
            <button class="mode" data-mode="break" type="button">Break</button>
            <button class="alarm-header-btn" id="alarmBtn" type="button">Alarm</button>
          </div>
        </div>

        <div class="timer-main">
          <div>
            <div class="timer-time" id="timeDisplay" contenteditable="true" spellcheck="false">25:00</div>
            <div class="status" id="statusText">Focus ready</div>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="controls-row">
          <button class="icon-btn" id="resetBtn" type="button" aria-label="Reset timer">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 3v6h6"></path></svg>
          </button>
          <button class="btn primary" id="startPauseBtn" type="button">Start</button>
          <button class="icon-btn" id="settingsToggle" type="button" aria-label="Toggle settings">
            <svg viewBox="0 0 24 24"><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>
          </button>
        </div>

        <div class="alarm-countdown" id="alarmCountdown">
          <span id="alarmCountdownLabel">Alarm set for --:--</span>
          <span class="cd-time" id="alarmCountdownTime">--:--:--</span>
        </div>

        <div class="settings" id="settingsPanel" hidden>
          <div class="field-grid">
            <div class="field">
              <label for="focusMinutes">Focus</label>
              <div class="stepper">
                <button type="button" data-step="-1" data-target="focusMinutes">−</button>
                <input id="focusMinutes" type="number" min="1" max="180" value="25">
                <button type="button" data-step="1" data-target="focusMinutes">+</button>
              </div>
            </div>
            <div class="field">
              <label for="breakMinutes">Break</label>
              <div class="stepper">
                <button type="button" data-step="-1" data-target="breakMinutes">−</button>
                <input id="breakMinutes" type="number" min="1" max="60" value="5">
                <button type="button" data-step="1" data-target="breakMinutes">+</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <details class="section" open>
        <summary>
          <span class="section-title">Sticky Notes</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>
        <div class="section-body">
          <div class="notes-actions">
            <button class="notes-add" id="addNoteBtn" type="button" aria-label="Add note">+</button>
            <button class="notes-clear" id="clearNotesBtn" type="button" disabled>Clear</button>
          </div>
          <div class="notes-list" id="notesList"></div>
          <div class="notes-empty" id="notesEmpty">No notes yet.</div>
        </div>
      </details>

      <section class="panel">
        <div class="perplexity-panel">
          <div class="section-title">Perplexity Search</div>
          <form class="perplexity-form" id="perplexityForm">
            <label class="sr-only" for="perplexityInput">Ask Perplexity</label>
            <input id="perplexityInput" class="perplexity-input" type="text" placeholder="Ask Perplexity anything..." autocomplete="off" required>
            <button class="mini-btn" type="submit">Search</button>
          </form>
        </div>
      </section>

      <details class="section">
        <summary>
          <span class="section-title">Music</span>
          <span class="chev" aria-hidden="true"></span>
        </summary>
        <div class="section-body">
          <div class="music-row" id="videoPlaylists"></div>
          <div class="video-frame">
            <iframe
              id="videoFrame"
              src="https://www.youtube-nocookie.com/embed/oPVte6aMprI?autoplay=0&rel=0&list=RDoPVte6aMprI"
              title="Music player"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen></iframe>
          </div>
          <div class="video-hint">Choose a playlist for background focus.</div>
        </div>
      </details>
    </div>
  </div>

  <div class="alarm-modal" id="alarmModal" role="dialog" aria-modal="true" aria-labelledby="alarmModalTitle">
    <div class="alarm-card">
      <div class="alarm-card-title" id="alarmModalTitle">Set Alarm Time</div>
      <input class="alarm-input" id="alarmTimeInput" type="time" step="60">
      <div class="alarm-actions">
        <button class="mini-btn" id="alarmCancel" type="button">Cancel</button>
        <button class="mini-btn" id="alarmClear" type="button">Clear</button>
        <button class="btn primary" id="alarmSet" type="button">Set</button>
      </div>
    </div>
  </div>

  <div class="alert-overlay" id="alertOverlay" role="alertdialog" aria-modal="true" aria-labelledby="alertTitle">
    <div class="alert-card">
      <div class="alert-icon" aria-hidden="true">🔔</div>
      <div class="alert-title" id="alertTitle">Alarm</div>
      <div class="alert-time" id="alertTime">--:--</div>
      <div class="alert-sub">Time's up</div>
      <button class="alert-dismiss" id="alertDismiss" type="button">Dismiss</button>
    </div>
  </div>

  <script>
    const state = {
      durations: { focus: 25, break: 5 },
      mode: 'focus',
      totalSeconds: 25 * 60,
      remainingSeconds: 25 * 60,
      running: false,
      intervalId: null,
      clearArmed: false,
      notes: [],
      alarmTarget: null,
      alarmIntervalId: null,
      alertSoundIntervalId: null,
      titleFlashIntervalId: null,
      originalTitle: document.title,
      audioCtx: null
    };

    const modes = document.querySelectorAll('.mode');
    const timeDisplay = document.getElementById('timeDisplay');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const startPauseBtn = document.getElementById('startPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsPanel = document.getElementById('settingsPanel');
    const wallclockTime = document.getElementById('wallclockTime');
    const wallclockDate = document.getElementById('wallclockDate');
    const focusMinutes = document.getElementById('focusMinutes');
    const breakMinutes = document.getElementById('breakMinutes');
    const notesList = document.getElementById('notesList');
    const notesEmpty = document.getElementById('notesEmpty');
    const addNoteBtn = document.getElementById('addNoteBtn');
    const clearNotesBtn = document.getElementById('clearNotesBtn');
    const perplexityForm = document.getElementById('perplexityForm');
    const perplexityInput = document.getElementById('perplexityInput');
    const videoFrame = document.getElementById('videoFrame');
    const videoPlaylists = document.getElementById('videoPlaylists');

    const alarmBtn = document.getElementById('alarmBtn');
    const alarmModal = document.getElementById('alarmModal');
    const alarmTimeInput = document.getElementById('alarmTimeInput');
    const alarmSet = document.getElementById('alarmSet');
    const alarmCancel = document.getElementById('alarmCancel');
    const alarmClear = document.getElementById('alarmClear');
    const alarmCountdown = document.getElementById('alarmCountdown');
    const alarmCountdownLabel = document.getElementById('alarmCountdownLabel');
    const alarmCountdownTime = document.getElementById('alarmCountdownTime');

    const alertOverlay = document.getElementById('alertOverlay');
    const alertTime = document.getElementById('alertTime');
    const alertDismiss = document.getElementById('alertDismiss');

    const playlists = [
      { label: 'Relax', url: 'https://www.youtube-nocookie.com/embed/oPVte6aMprI?autoplay=0&rel=0&list=RDoPVte6aMprI' },
      { label: 'Country', url: 'https://www.youtube-nocookie.com/embed/TsfDpW7PYN8?autoplay=0&rel=0&list=RDTsfDpW7PYN8' }
    ];

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function parseTime(text) {
      const match = text.trim().match(/^(\d{1,3}):(\d{2})$/);
      if (!match) return null;
      const minutes = Number(match[1]);
      const seconds = Number(match[2]);
      if (seconds > 59) return null;
      return minutes * 60 + seconds;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(state.remainingSeconds);
      const ratio = state.totalSeconds > 0 ? state.remainingSeconds / state.totalSeconds : 0;
      progressFill.style.transform = `scaleX(${ratio})`;
      const label = state.mode === 'focus' ? 'Focus' : 'Break';
      statusText.textContent = state.running
        ? label + ' running'
        : (state.remainingSeconds === 0 ? label + ' done' : label + ' ready');
      startPauseBtn.textContent = state.running ? 'Pause' : 'Start';
    }

    function getAudioCtx() {
      if (!state.audioCtx) {
        try { state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
      }
      if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
      return state.audioCtx;
    }

    function playBeepBurst() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const pattern = [880, 660, 880, 660];
      pattern.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        const start = ctx.currentTime + i * 0.22;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.3, start + 0.03);
        gain.gain.linearRampToValueAtTime(0, start + 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.22);
      });
    }

    function startAlertSound() {
      playBeepBurst();
      state.alertSoundIntervalId = setInterval(playBeepBurst, 1200);
    }

    function stopAlertSound() {
      if (state.alertSoundIntervalId) {
        clearInterval(state.alertSoundIntervalId);
        state.alertSoundIntervalId = null;
      }
    }

    function startTitleFlash(timeStr) {
      let toggle = false;
      state.titleFlashIntervalId = setInterval(() => {
        toggle = !toggle;
        document.title = toggle ? `🔔 ALARM — ${timeStr}` : `⏰ ${state.originalTitle}`;
      }, 800);
    }

    function stopTitleFlash() {
      if (state.titleFlashIntervalId) {
        clearInterval(state.titleFlashIntervalId);
        state.titleFlashIntervalId = null;
      }
      document.title = state.originalTitle;
    }

    function requestNotificationPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        Notification.requestPermission().catch(() => {});
      }
    }

    function sendBrowserNotification(timeStr) {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') return;
      try {
        const n = new Notification('⏰ Alarm', {
          body: `It's ${timeStr} — your alarm is going off.`,
          tag: 'widget-alarm',
          requireInteraction: true
        });
        n.onclick = () => { window.focus(); n.close(); };
      } catch (e) {}
    }

    function fireAlert() {
      const target = state.alarmTarget || new Date();
      const timeStr = formatClock12(target);
      alertTime.textContent = timeStr;
      alertOverlay.classList.add('open');
      document.body.classList.add('alarm-firing');
      startAlertSound();
      startTitleFlash(timeStr);
      sendBrowserNotification(timeStr);
      if (navigator.vibrate) {
        try { navigator.vibrate([500, 250, 500, 250, 500, 250, 500]); } catch (e) {}
      }
    }

    function dismissAlert() {
      alertOverlay.classList.remove('open');
      document.body.classList.remove('alarm-firing');
      stopAlertSound();
      stopTitleFlash();
      if (navigator.vibrate) { try { navigator.vibrate(0); } catch (e) {} }
      state.alarmTarget = null;
      alarmCountdown.classList.remove('visible');
      alarmBtn.classList.remove('armed');
      alarmBtn.textContent = 'Alarm';
    }

    function setMode(mode) {
      state.mode = mode;
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = state.durations[mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      modes.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      updateDisplay();
    }

    function tick() {
      if (state.remainingSeconds > 0) {
        state.remainingSeconds -= 1;
        updateDisplay();
      } else {
        state.running = false;
        clearInterval(state.intervalId);
        state.intervalId = null;
        updateDisplay();
      }
    }

    function toggleTimer() {
      if (state.running) {
        state.running = false;
        clearInterval(state.intervalId);
        state.intervalId = null;
      } else {
        state.running = true;
        state.intervalId = setInterval(tick, 1000);
      }
      updateDisplay();
    }

    function resetTimer() {
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = state.durations[state.mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      updateDisplay();
    }

    function toggleSettings() {
      const isHidden = settingsPanel.hasAttribute('hidden');
      if (isHidden) settingsPanel.removeAttribute('hidden');
      else settingsPanel.setAttribute('hidden', '');
    }

    function clampInputValue(input) {
      const min = Number(input.min || 1);
      const max = Number(input.max || 999);
      let value = Number(input.value || min);
      if (!Number.isFinite(value)) value = min;
      value = Math.min(max, Math.max(min, value));
      input.value = value;
      return value;
    }

    function applyDurations() {
      state.durations.focus = clampInputValue(focusMinutes);
      state.durations.break = clampInputValue(breakMinutes);
      state.totalSeconds = state.durations[state.mode] * 60;
      state.remainingSeconds = state.totalSeconds;
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      updateDisplay();
    }

    function updateWallclock() {
      const now = new Date();
      const time = new Intl.DateTimeFormat('en-US', {
        hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York'
      }).format(now);
      const date = new Intl.DateTimeFormat('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/New_York'
      }).format(now);
      wallclockTime.textContent = time;
      wallclockDate.textContent = `${date} · Eastern Time`;
    }

    function formatClock12(date) {
      return new Intl.DateTimeFormat('en-US', {
        hour: 'numeric', minute: '2-digit', hour12: true
      }).format(date);
    }

    function formatHMS(totalSeconds) {
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      const pad = n => String(n).padStart(2, '0');
      return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    }

    function openAlarmModal() {
      let seed = state.alarmTarget ? new Date(state.alarmTarget) : new Date(Date.now() + 5 * 60 * 1000);
      const hh = String(seed.getHours()).padStart(2, '0');
      const mm = String(seed.getMinutes()).padStart(2, '0');
      alarmTimeInput.value = `${hh}:${mm}`;
      alarmModal.classList.add('open');
      setTimeout(() => alarmTimeInput.focus(), 50);
      requestNotificationPermission();
      getAudioCtx();
    }

    function closeAlarmModal() { alarmModal.classList.remove('open'); }

    function setAlarmFromInput() {
      const val = alarmTimeInput.value;
      if (!val) return;
      const [h, m] = val.split(':').map(Number);
      const now = new Date();
      const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
      if (target.getTime() <= now.getTime()) target.setDate(target.getDate() + 1);
      state.alarmTarget = target;
      startAlarmCountdown();
      closeAlarmModal();
    }

    function clearAlarm() {
      state.alarmTarget = null;
      if (state.alarmIntervalId) {
        clearInterval(state.alarmIntervalId);
        state.alarmIntervalId = null;
      }
      alarmCountdown.classList.remove('visible');
      alarmBtn.classList.remove('armed');
      alarmBtn.textContent = 'Alarm';
      closeAlarmModal();
    }

    function startAlarmCountdown() {
      if (state.alarmIntervalId) {
        clearInterval(state.alarmIntervalId);
        state.alarmIntervalId = null;
      }
      alarmBtn.classList.add('armed');
      alarmBtn.textContent = 'Alarm ●';
      alarmCountdown.classList.add('visible');
      updateAlarmCountdown();
      state.alarmIntervalId = setInterval(updateAlarmCountdown, 1000);
    }

    function updateAlarmCountdown() {
      if (!state.alarmTarget) return;
      const now = new Date();
      const diffMs = state.alarmTarget.getTime() - now.getTime();
      const diffSec = Math.max(0, Math.floor(diffMs / 1000));
      alarmCountdownLabel.textContent = `Alarm set for ${formatClock12(state.alarmTarget)}`;
      alarmCountdownTime.textContent = formatHMS(diffSec);
      if (diffSec <= 0) {
        clearInterval(state.alarmIntervalId);
        state.alarmIntervalId = null;
        alarmCountdownLabel.textContent = `Alarm — ${formatClock12(state.alarmTarget)}`;
        alarmCountdownTime.textContent = '00:00';
        fireAlert();
      }
    }

    function renderNotes() {
      notesList.innerHTML = '';
      notesEmpty.style.display = state.notes.length ? 'none' : 'block';
      clearNotesBtn.disabled = state.notes.length === 0;
      if (state.notes.length === 0) return;

      state.notes.forEach((note, index) => {
        const card = document.createElement('div');
        card.className = 'sticky';
        const del = document.createElement('button');
        del.className = 'sticky-del';
        del.type = 'button';
        del.setAttribute('aria-label', 'Delete note');
        del.textContent = '×';
        del.addEventListener('click', () => {
          state.notes.splice(index, 1);
          state.clearArmed = false;
          clearNotesBtn.classList.remove('armed');
          clearNotesBtn.textContent = 'Clear';
          renderNotes();
        });
        const text = document.createElement('textarea');
        text.className = 'sticky-text';
        text.value = note;
        text.placeholder = 'Write here...';
        text.addEventListener('input', () => { state.notes[index] = text.value; });
        card.appendChild(del);
        card.appendChild(text);
        notesList.appendChild(card);
      });
    }

    function addNote() {
      state.notes.unshift('');
      state.clearArmed = false;
      clearNotesBtn.classList.remove('armed');
      clearNotesBtn.textContent = 'Clear';
      renderNotes();
      const first = notesList.querySelector('.sticky-text');
      if (first) first.focus();
    }

    function clearNotes() {
      if (!state.clearArmed) {
        state.clearArmed = true;
        clearNotesBtn.classList.add('armed');
        clearNotesBtn.textContent = 'Sure?';
        setTimeout(() => {
          state.clearArmed = false;
          clearNotesBtn.classList.remove('armed');
          clearNotesBtn.textContent = 'Clear';
        }, 2500);
        return;
      }
      state.notes = [];
      state.clearArmed = false;
      clearNotesBtn.classList.remove('armed');
      clearNotesBtn.textContent = 'Clear';
      renderNotes();
    }

    function setupVideoPlaylists() {
      playlists.forEach((playlist, index) => {
        const btn = document.createElement('button');
        btn.className = 'music-btn' + (index === 0 ? ' active' : '');
        btn.type = 'button';
        btn.textContent = playlist.label;
        btn.addEventListener('click', () => {
          videoFrame.src = playlist.url;
          document.querySelectorAll('.music-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
        videoPlaylists.appendChild(btn);
      });
    }

    function handlePerplexitySearch(e) {
      e.preventDefault();
      const query = perplexityInput.value.trim();
      if (!query) return;
      const url = 'https://www.perplexity.ai/search?q=' + encodeURIComponent(query);
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    modes.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
    startPauseBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);
    settingsToggle.addEventListener('click', toggleSettings);

    [focusMinutes, breakMinutes].forEach(input => {
      input.addEventListener('change', applyDurations);
      input.addEventListener('blur', applyDurations);
    });

    document.querySelectorAll('.stepper button').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const step = Number(btn.dataset.step || 0);
        target.value = Number(target.value || 0) + step;
        applyDurations();
      });
    });

    timeDisplay.addEventListener('blur', () => {
      const parsed = parseTime(timeDisplay.textContent);
      if (parsed === null || parsed <= 0) { updateDisplay(); return; }
      state.running = false;
      clearInterval(state.intervalId);
      state.intervalId = null;
      state.totalSeconds = parsed;
      state.remainingSeconds = parsed;
      updateDisplay();
    });

    timeDisplay.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); timeDisplay.blur(); }
    });

    addNoteBtn.addEventListener('click', addNote);
    clearNotesBtn.addEventListener('click', clearNotes);
    perplexityForm.addEventListener('submit', handlePerplexitySearch);

    alarmBtn.addEventListener('click', openAlarmModal);
    alarmCancel.addEventListener('click', closeAlarmModal);
    alarmSet.addEventListener('click', setAlarmFromInput);
    alarmClear.addEventListener('click', clearAlarm);
    alarmModal.addEventListener('click', (e) => { if (e.target === alarmModal) closeAlarmModal(); });
    alarmTimeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); setAlarmFromInput(); }
    });

    alertDismiss.addEventListener('click', dismissAlert);

    updateDisplay();
    updateWallclock();
    setInterval(updateWallclock, 1000);
    renderNotes();
    setupVideoPlaylists();
  </script>
</body>
</html>
