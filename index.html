<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upstate Nursing Informatics Clock</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #111827;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 4px;
    }

    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #4b5563;
      margin-top: 0;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 20px 22px;
    }

    .card h3 {
      margin: 0 0 12px 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #6b7280;
    }

    /* --- Perplexity search --- */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-row input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      font-size: 0.9rem;
    }

    .search-row button {
      padding: 8px 14px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .search-row button:hover {
      background: #1d4ed8;
    }

    .search-hint {
      font-size: 0.75rem;
      color: #6b7280;
    }

    /* simple clock text placeholder */
    .clock-display {
      font-size: 2.5rem;
      font-weight: 500;
      text-align: center;
      margin: 18px 0;
    }
  </style>
</head>
<body>

  <h1>Upstate Nursing Informatics</h1>
  <h2>Pomodoro, Notes, and Perplexity Search</h2>

  <div class="grid">
    <!-- Left: Clock / Pomodoro -->
    <div class="card">
      <h3>Pomodoro Clock</h3>
      <div class="clock-display" id="clock">25:00</div>
      <!-- You can keep/extend your existing buttons here -->
      <button id="start-btn">Start</button>
      <button id="reset-btn">Reset</button>
    </div>

    <!-- Right: Perplexity search + notes -->
    <div class="card">
      <h3>Perplexity Search</h3>
      <form id="perplexity-form">
        <div class="search-row">
          <input
            type="text"
            id="perplexity-query"
            placeholder="Ask Perplexity anything…"
            autocomplete="off"
            required
          />
          <button type="submit">Search</button>
        </div>
        <div class="search-hint">
          Opens a new tab to Perplexity with your query.
        </div>
      </form>

      <hr style="margin: 16px 0; border: none; border-top: 1px solid #e5e7eb;">

      <h3>Sticky Notes</h3>
      <textarea
        id="notes"
        rows="6"
        style="width:100%; border-radius:10px; border:1px solid #d1d5db; padding:8px; font-size:0.9rem;"
        placeholder="Jot down quick ideas or reminders…"
      ></textarea>
      <div style="margin-top:8px; font-size:0.75rem; color:#6b7280;">
        Notes are stored only in this browser; clearing cache will remove them.
      </div>
    </div>
  </div>

  <script>
    // --- Perplexity search handler ---
    document.getElementById("perplexity-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const q = document.getElementById("perplexity-query").value.trim();
      if (!q) return;

      // Build Perplexity URL; encode query for safety
      const url = "https://www.perplexity.ai/search?q=" + encodeURIComponent(q);
      window.open(url, "_blank");
    });

    // --- Very simple notes persistence ---
    const notesEl = document.getElementById("notes");
    const NOTES_KEY = "ni_clock_notes";

    notesEl.value = localStorage.getItem(NOTES_KEY) || "";
    notesEl.addEventListener("input", () => {
      localStorage.setItem(NOTES_KEY, notesEl.value);
    });

    // --- Minimal Pomodoro placeholder ---
    let seconds = 25 * 60;
    let timerId = null;

    function renderClock() {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById("clock").textContent =
        String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    document.getElementById("start-btn").addEventListener("click", () => {
      if (timerId) return;
      timerId = setInterval(() => {
        if (seconds > 0) {
          seconds -= 1;
          renderClock();
        } else {
          clearInterval(timerId);
          timerId = null;
          alert("Pomodoro complete!");
        }
      }, 1000);
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      clearInterval(timerId);
      timerId = null;
      seconds = 25 * 60;
      renderClock();
    });

    renderClock();
  </script>
</body>
</html>
